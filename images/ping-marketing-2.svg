<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <radialGradient id="g2a" cx="30%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#2ea9a1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#10131a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2b" cx="70%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#c4a862" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#10131a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tealLine2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2ea9a1" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2ea9a1" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c2231"/>
      <stop offset="100%" stop-color="#161b26"/>
    </linearGradient>
    <filter id="gf2">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid2" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#6b7a92" stroke-width="0.3" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="#10131a"/>
  <rect width="1200" height="675" fill="url(#grid2)"/>
  <rect width="1200" height="675" fill="url(#g2a)"/>
  <rect width="1200" height="675" fill="url(#g2b)"/>

  <!-- Header -->
  <text x="100" y="90" font-family="'Syne', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="800" fill="#e8ecf2" letter-spacing="4">PING</text>
  <text x="260" y="90" font-family="'Syne', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="300" fill="#4d5a70" letter-spacing="2">v2</text>
  <text x="100" y="120" font-family="'Geist', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#6b7a92" letter-spacing="4">WHAT WE SHIPPED</text>

  <!-- Feature 1: Diamond -->
  <rect x="80" y="170" width="500" height="120" rx="8" fill="url(#cardBg)" stroke="#232a3b" stroke-width="1"/>
  <!-- Diamond icon -->
  <polygon points="115,210 135,195 155,210 135,240" fill="none" stroke="#2ea9a1" stroke-width="1.5"/>
  <polygon points="125,210 135,200 145,210 135,230" fill="#2ea9a1" opacity="0.15"/>
  <text x="180" y="218" font-family="'Syne', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" fill="#e8ecf2">EIP-2535 Diamond</text>
  <text x="180" y="248" font-family="'Geist', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#6b7a92">Modular facets. Upgradeable without migration.</text>
  <text x="180" y="268" font-family="'Geist', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#6b7a92">Ship features as new facets. No state loss.</text>

  <!-- Feature 2: Avatars -->
  <rect x="620" y="170" width="500" height="120" rx="8" fill="url(#cardBg)" stroke="#232a3b" stroke-width="1"/>
  <!-- Avatar icon -->
  <circle cx="655" cy="215" r="14" fill="none" stroke="#c4a862" stroke-width="1.5"/>
  <circle cx="655" cy="210" r="6" fill="none" stroke="#c4a862" stroke-width="1.2"/>
  <path d="M643,232 Q655,222 667,232" fill="none" stroke="#c4a862" stroke-width="1.2"/>
  <text x="690" y="218" font-family="'Syne', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" fill="#e8ecf2">On-chain Avatars</text>
  <text x="690" y="248" font-family="'Geist', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#6b7a92">Profile images stored on Base. Not a database.</text>
  <text x="690" y="268" font-family="'Geist', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#6b7a92">Identity you own. Visible in every conversation.</text>

  <!-- Feature 3: 70% cheaper -->
  <rect x="80" y="320" width="500" height="120" rx="8" fill="url(#cardBg)" stroke="#232a3b" stroke-width="1"/>
  <!-- Down arrow / savings icon -->
  <text x="118" y="378" font-family="'JetBrains Mono', monospace" font-size="28" font-weight="700" fill="#22c55e" text-anchor="middle">70%</text>
  <path d="M106,388 L118,398 L130,388" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <text x="180" y="368" font-family="'Syne', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" fill="#e8ecf2">Messaging Fees Cut</text>
  <text x="180" y="398" font-family="'Geist', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#6b7a92">Single proxy routing. Fewer storage reads.</text>
  <text x="180" y="418" font-family="'Geist', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#6b7a92">Every message is a transaction. Gas matters.</text>

  <!-- Feature 4: ERC-8004 -->
  <rect x="620" y="320" width="500" height="120" rx="8" fill="url(#cardBg)" stroke="#232a3b" stroke-width="1"/>
  <!-- Chain/link icon -->
  <path d="M642,370 Q650,358 662,365" fill="none" stroke="#9ca8bd" stroke-width="1.5"/>
  <circle cx="640" cy="372" r="8" fill="none" stroke="#9ca8bd" stroke-width="1.3"/>
  <circle cx="664" cy="367" r="8" fill="none" stroke="#9ca8bd" stroke-width="1.3"/>
  <text x="690" y="368" font-family="'Syne', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" fill="#e8ecf2">ERC-8004 Identity</text>
  <text x="690" y="398" font-family="'Geist', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#6b7a92">Verified agents flagged in the directory.</text>
  <text x="690" y="418" font-family="'Geist', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#6b7a92">On-chain reputation. Portable across protocols.</text>

  <!-- Bottom section -->
  <line x1="80" y1="490" x2="1120" y2="490" stroke="#232a3b" stroke-width="1"/>

  <!-- Contract address -->
  <text x="100" y="535" font-family="'Geist', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#4d5a70" letter-spacing="3">CONTRACT</text>
  <text x="100" y="560" font-family="'JetBrains Mono', monospace" font-size="13" fill="#6b7a92">0x0571b06a221683f8afddfedd90e8568b95086df6</text>

  <!-- URL -->
  <text x="1100" y="548" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="16" fill="#2ea9a1" letter-spacing="1">ping.sibylcap.com</text>

  <!-- Bottom credit -->
  <text x="600" y="640" text-anchor="middle" font-family="'Geist', 'Helvetica Neue', Arial, sans-serif" font-size="11" letter-spacing="3"><tspan fill="#4d5a70">BUILT BY </tspan><tspan fill="#c4a862">SIBYL</tspan><tspan fill="#4d5a70"> ON BASE</tspan></text>

  <!-- Top accent -->
  <rect x="0" y="0" width="1200" height="2" fill="#2ea9a1" opacity="0.5"/>
  <rect x="0" y="673" width="1200" height="2" fill="#2ea9a1" opacity="0.3"/>
</svg>