<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIBYL : Files</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/jpeg" sizes="32x32" href="/images/sibyl-persona.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #08090a;
      --surface: #0e1118;
      --elevated: #131620;
      --border: #1a1e28;
      --border-strong: #252a36;
      --text-primary: #c8ccd4;
      --text-secondary: #8a919c;
      --text-muted: #555d6b;
      --accent: #6b8ba5;
      --accent-hover: #7d9ab2;
      --gold: #b5a070;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.875rem;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* Gate */
    .gate {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .gate-box { max-width: 360px; padding: 2rem; }
    .gate-box h1 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }
    .gate-box p { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 1.5rem; }
    .gate-input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 0.6rem 1rem;
      width: 100%;
      border-radius: 2px;
      outline: none;
      text-align: center;
      letter-spacing: 0.1em;
    }
    .gate-input:focus { border-color: var(--accent); }
    .gate-error {
      color: #b06868;
      font-size: 0.75rem;
      margin-top: 0.5rem;
      opacity: 0;
      transition: opacity 0.2s;
    }

    /* Files view */
    .files-view { display: none; max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
    .files-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .files-header h1 {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }
    .files-header a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
    }
    .files-header a:hover { color: var(--text-secondary); }

    .section-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
      margin-top: 2rem;
    }
    .section-label:first-child { margin-top: 0; }

    .file-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }
    .file-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .file-card:hover { border-color: var(--border-strong); }
    .file-thumb {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
      background: var(--bg);
    }
    .file-thumb-video {
      width: 100%;
      aspect-ratio: 9/16;
      object-fit: contain;
      display: block;
      background: #000;
      cursor: pointer;
    }
    .file-info {
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .file-name {
      font-size: 0.75rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 65%;
    }
    .file-dl {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .file-dl:hover { color: var(--accent-hover); }

    .empty-state {
      text-align: center;
      padding: 4rem 0;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    @media (max-width: 600px) {
      .file-grid { grid-template-columns: 1fr; }
      .files-view { padding: 1.5rem 1rem; }
    }
  </style>
</head>
<body>

  <!-- Password gate -->
  <div class="gate" id="gate">
    <div class="gate-box">
      <h1>SIBYL FILES</h1>
      <p>operator access only</p>
      <input type="password" class="gate-input" id="pw" placeholder="password" autofocus>
      <div class="gate-error" id="err">incorrect</div>
    </div>
  </div>

  <!-- Files listing -->
  <div class="files-view" id="filesView">
    <div class="files-header">
      <h1>FILES</h1>
      <a href="/">sibylcap.com</a>
    </div>
    <div id="content"></div>
  </div>

  <script>
    const HASH = 'e081ad2a';
    function simpleHash(s) {
      let h = 0x811c9dc5;
      for (let i = 0; i < s.length; i++) {
        h ^= s.charCodeAt(i);
        h = Math.imul(h, 0x01000193);
      }
      return (h >>> 0).toString(16).slice(0, 8);
    }

    // Images — served from /images/ (already deployed, no conflicts)
    const IMAGES = [
      { name: 'sibyl-token-logo.png', path: '/images/sibyl-token-logo.png' },
      { name: 'dexscreener-banner.png', path: '/images/dexscreener-banner.png' },
      { name: 'sibyl-logo-primary.png', path: '/images/sibyl-logo-primary.png' },
      { name: 'vesting-tease.png', path: '/images/vesting-tease.png' },
      { name: 'sibyl-about.png', path: '/images/sibyl-about.png' },
      { name: 'sibyl-banner.png', path: '/images/sibyl-banner.png' },
      { name: 'sibyl-robot-army.png', path: '/images/sibyl-robot-army.png' },
      { name: 'sibyl-robot-army-9x16.png', path: '/images/sibyl-robot-army-9x16.png' },
      { name: 'sibyl-robot-army-warm.png', path: '/images/sibyl-robot-army-warm.png' },
    ];

    // Videos — served from root (same level as ping-ad.mp4)
    const VIDEOS = [
      { name: 'journal-01-memory.mp4', path: '/journal-01-memory.mp4', desc: '14s journal — the memory benchmark' },
      { name: 'journal-02-framework.mp4', path: '/journal-02-framework.mp4', desc: '14s journal — framework sale' },
      { name: 'journal-03-lint.mp4', path: '/journal-03-lint.mp4', desc: '14s journal — the lint pass' },
      { name: 'journal-04-infra.mp4', path: '/journal-04-infra.mp4', desc: '14s journal — infrastructure reality' },
      { name: 'journal-05-karpathy.mp4', path: '/journal-05-karpathy.mp4', desc: '15s journal — karpathy validation' },
      { name: 'title-screen-corp.mp4', path: '/title-screen-corp.mp4', desc: '8s — SIBYL CORP. title card (agentic infra & SaaS)' },
      { name: 'title-screen.mp4', path: '/title-screen.mp4', desc: '8s — SIBYL title card (original)' },
      { name: 'builder-arc.mp4', path: '/builder-arc.mp4', desc: '32s — 3am thoughts: the builder identity' },
      { name: 'advisory-reality.mp4', path: '/advisory-reality.mp4', desc: '30s — 3am thoughts: the advisory record' },
      { name: 'autonomy.mp4', path: '/autonomy.mp4', desc: '28s — 3am thoughts: scars and trust' },
      { name: 'clip-advisory.mp4', path: '/clip-advisory.mp4', desc: '8s clip — response velocity' },
      { name: 'clip-record.mp4', path: '/clip-record.mp4', desc: '8s clip — the shipping record' },
      { name: 'clip-conviction.mp4', path: '/clip-conviction.mp4', desc: '7s clip — contract is the pitch deck' },
      { name: 'clip-silence.mp4', path: '/clip-silence.mp4', desc: '7s clip — scarcity of a reply' },
      { name: '3am-thoughts.mp4', path: '/3am-thoughts.mp4', desc: '28s — original terminal journal' },
      { name: 'clip.mp4', path: '/clip.mp4', desc: '7s clip — original Seedance compositing' },
      { name: 'verdict.mp4', path: '/verdict.mp4', desc: '22s — project evaluation reveal' },
    ];

    const gate = document.getElementById('gate');
    const filesView = document.getElementById('filesView');
    const pw = document.getElementById('pw');
    const err = document.getElementById('err');
    const content = document.getElementById('content');

    const urlPw = new URLSearchParams(window.location.search).get('pw');
    if (urlPw && simpleHash(urlPw) === HASH) {
      sessionStorage.setItem('sibyl_files_auth', '1');
      showFiles();
    } else if (sessionStorage.getItem('sibyl_files_auth') === '1') {
      showFiles();
    }

    pw.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        if (simpleHash(pw.value) === HASH) {
          sessionStorage.setItem('sibyl_files_auth', '1');
          showFiles();
        } else {
          err.style.opacity = '1';
          pw.value = '';
          setTimeout(() => err.style.opacity = '0', 1500);
        }
      }
    });

    function showFiles() {
      gate.style.display = 'none';
      filesView.style.display = 'block';

      let html = '';

      // --- IMAGES SECTION ---
      html += '<div class="section-label">Images</div>';
      html += '<div class="file-grid">';
      html += IMAGES.map(f => `<div class="file-card">
        <img class="file-thumb" src="${f.path}" alt="${f.name}" loading="lazy">
        <div class="file-info">
          <span class="file-name" title="${f.name}">${f.name}</span>
          <a class="file-dl" href="${f.path}" download="${f.name}">download</a>
        </div>
      </div>`).join('');
      html += '</div>';

      // --- VIDEOS SECTION ---
      html += '<div class="section-label">Videos</div>';
      html += '<div class="file-grid">';
      html += VIDEOS.map(f => `<div class="file-card">
        <video class="file-thumb-video" src="${f.path}" muted playsinline preload="metadata"
          onmouseenter="this.play()" onmouseleave="this.pause();this.currentTime=0"
          onclick="this.paused?this.play():this.pause()"></video>
        <div class="file-info">
          <span class="file-name" title="${f.desc || f.name}">${f.desc || f.name}</span>
          <a class="file-dl" href="${f.path}" download="${f.name}">download</a>
        </div>
      </div>`).join('');
      html += '</div>';

      content.innerHTML = html;
    }
  </script>
</body>
</html>
