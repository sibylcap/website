<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIBYL Evaluation Card</title>
<style>
  body { margin: 0; background: #0a0c12; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, sans-serif; }
  .card-wrap { max-width: 520px; width: 100%; padding: 20px; }
  img { width: 100%; height: auto; border-radius: 16px; }
</style>
</head>
<body>
<div class="card-wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="520" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10131a"/>
      <stop offset="100%" stop-color="#161b26"/>
    </linearGradient>
    <linearGradient id="score-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2ea9a1"/>
      <stop offset="100%" stop-color="#3cc4bb"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#2ea9a1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="round"><rect width="520" height="320" rx="16"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- Background -->
    <rect width="520" height="320" fill="url(#bg)"/>

    <!-- Subtle grid pattern -->
    <g opacity="0.03" stroke="#2ea9a1" stroke-width="0.5">
      <line x1="0" y1="40" x2="520" y2="40"/><line x1="0" y1="80" x2="520" y2="80"/>
      <line x1="0" y1="120" x2="520" y2="120"/><line x1="0" y1="160" x2="520" y2="160"/>
      <line x1="0" y1="200" x2="520" y2="200"/><line x1="0" y1="240" x2="520" y2="240"/>
      <line x1="0" y1="280" x2="520" y2="280"/>
      <line x1="40" y1="0" x2="40" y2="320"/><line x1="80" y1="0" x2="80" y2="320"/>
      <line x1="120" y1="0" x2="120" y2="320"/><line x1="160" y1="0" x2="160" y2="320"/>
      <line x1="200" y1="0" x2="200" y2="320"/><line x1="240" y1="0" x2="240" y2="320"/>
      <line x1="280" y1="0" x2="280" y2="320"/><line x1="320" y1="0" x2="320" y2="320"/>
      <line x1="360" y1="0" x2="360" y2="320"/><line x1="400" y1="0" x2="400" y2="320"/>
      <line x1="440" y1="0" x2="440" y2="320"/><line x1="480" y1="0" x2="480" y2="320"/>
    </g>

    <!-- Top accent line -->
    <rect x="0" y="0" width="520" height="2" fill="url(#score-ring)" opacity="0.6"/>

    <!-- SIBYL brand -->
    <text x="28" y="38" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="9" font-weight="700" letter-spacing="0.15em" fill="#2ea9a1" opacity="0.5">SIBYL EVALUATION</text>

    <!-- Score circle -->
    <g transform="translate(440, 72)" filter="url(#glow)">
      <circle cx="0" cy="0" r="42" fill="none" stroke="#1c2231" stroke-width="5"/>
      <circle cx="0" cy="0" r="42" fill="none" stroke="url(#score-ring)" stroke-width="5"
        stroke-dasharray="211" stroke-dashoffset="47" stroke-linecap="round"
        transform="rotate(-90)"/>
      <text x="0" y="6" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="28" font-weight="700" fill="#e8ecf2">78</text>
      <text x="0" y="20" text-anchor="middle" font-family="'SF Mono', monospace" font-size="8" font-weight="500" fill="#6b7a92" letter-spacing="0.08em">/100</text>
    </g>

    <!-- Token name + ticker -->
    <text x="28" y="72" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="26" font-weight="700" fill="url(#title-grad)">Exoskeletons</text>
    <text x="28" y="96" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="13" font-weight="500" fill="#c4a862">$EXO</text>
    <text x="72" y="96" font-family="'SF Mono', monospace" font-size="11" fill="#6b7a92">on Base</text>

    <!-- Divider -->
    <line x1="28" y1="114" x2="380" y2="114" stroke="#94a3c2" stroke-opacity="0.09"/>

    <!-- Score bars -->
    <g transform="translate(28, 130)">
      <!-- Builder Conviction -->
      <text y="10" font-family="-apple-system, sans-serif" font-size="11" font-weight="500" fill="#9ca8bd">Builder Conviction</text>
      <text x="352" y="10" font-family="'SF Mono', monospace" font-size="11" font-weight="600" fill="#2ea9a1" text-anchor="end">85</text>
      <rect y="18" width="352" height="4" rx="2" fill="#1c2231"/>
      <rect y="18" width="300" height="4" rx="2" fill="#2ea9a1"/>

      <!-- Community Seed -->
      <text y="46" font-family="-apple-system, sans-serif" font-size="11" font-weight="500" fill="#9ca8bd">Community Seed</text>
      <text x="352" y="46" font-family="'SF Mono', monospace" font-size="11" font-weight="600" fill="#2ea9a1" text-anchor="end">72</text>
      <rect y="54" width="352" height="4" rx="2" fill="#1c2231"/>
      <rect y="54" width="253" height="4" rx="2" fill="#2ea9a1"/>

      <!-- On-Chain Proof -->
      <text y="82" font-family="-apple-system, sans-serif" font-size="11" font-weight="500" fill="#9ca8bd">On-Chain Proof</text>
      <text x="352" y="82" font-family="'SF Mono', monospace" font-size="11" font-weight="600" fill="#2ea9a1" text-anchor="end">80</text>
      <rect y="90" width="352" height="4" rx="2" fill="#1c2231"/>
      <rect y="90" width="281" height="4" rx="2" fill="#2ea9a1"/>

      <!-- Product Clarity -->
      <text y="118" font-family="-apple-system, sans-serif" font-size="11" font-weight="500" fill="#9ca8bd">Product Clarity</text>
      <text x="352" y="118" font-family="'SF Mono', monospace" font-size="11" font-weight="600" fill="#c4a862" text-anchor="end">68</text>
      <rect y="126" width="352" height="4" rx="2" fill="#1c2231"/>
      <rect y="126" width="239" height="4" rx="2" fill="#c4a862"/>
    </g>

    <!-- Bottom bar -->
    <rect x="0" y="284" width="520" height="36" fill="#0d0f16"/>
    <line x1="0" y1="284" x2="520" y2="284" stroke="#94a3c2" stroke-opacity="0.06"/>

    <!-- Verdict badge -->
    <rect x="28" y="291" width="80" height="22" rx="4" fill="#2ea9a1" fill-opacity="0.12"/>
    <text x="68" y="306" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" font-weight="700" letter-spacing="0.06em" fill="#2ea9a1">ACQUIRED</text>

    <!-- Stats -->
    <text x="130" y="306" font-family="'SF Mono', monospace" font-size="9" fill="#6b7a92">15+ contracts</text>
    <text x="248" y="306" font-family="'SF Mono', monospace" font-size="9" fill="#4d5a70">|</text>
    <text x="264" y="306" font-family="'SF Mono', monospace" font-size="9" fill="#6b7a92">917 rounds tested</text>

    <!-- SIBYL branding bottom right -->
    <text x="492" y="306" text-anchor="end" font-family="'SF Mono', monospace" font-size="8" font-weight="600" letter-spacing="0.12em" fill="#2ea9a1" opacity="0.4">SIBYLCAP.COM</text>

    <!-- Border -->
    <rect width="520" height="320" rx="16" fill="none" stroke="#94a3c2" stroke-opacity="0.08"/>
  </g>
</svg>
</div>
</body>
</html>
