<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIBYL Evaluation Card</title>
<style>
  body { margin: 0; background: #06080d; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, sans-serif; }
  .card-wrap { max-width: 540px; width: 100%; padding: 20px; }
</style>
</head>
<body>
<div class="card-wrap">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 340" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="540" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c0f18"/>
      <stop offset="50%" stop-color="#10141e"/>
      <stop offset="100%" stop-color="#0a0e16"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2ea9a1"/>
      <stop offset="100%" stop-color="#34d9cd"/>
    </linearGradient>
    <linearGradient id="accent-bar" x1="0" y1="0" x2="352" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2ea9a1"/>
      <stop offset="100%" stop-color="#34d9cd"/>
    </linearGradient>
    <linearGradient id="gold-bar" x1="0" y1="0" x2="240" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4a862"/>
      <stop offset="100%" stop-color="#e0c97a"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0" y1="0" x2="280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0f4fa"/>
      <stop offset="100%" stop-color="#2ea9a1"/>
    </linearGradient>
    <linearGradient id="top-line" x1="0" y1="0" x2="540" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2ea9a1" stop-opacity="0"/>
      <stop offset="20%" stop-color="#2ea9a1"/>
      <stop offset="80%" stop-color="#34d9cd"/>
      <stop offset="100%" stop-color="#34d9cd" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="score-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2ea9a1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#2ea9a1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="corner-glow" cx="1" cy="0" r="1">
      <stop offset="0%" stop-color="#2ea9a1" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#2ea9a1" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="round"><rect width="540" height="340" rx="18"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- Background -->
    <rect width="540" height="340" fill="url(#bg)"/>

    <!-- Atmospheric glow top-right -->
    <rect width="540" height="340" fill="url(#corner-glow)"/>

    <!-- Noise texture sim via fine dots -->
    <g opacity="0.015">
      <circle cx="45" cy="55" r="0.7" fill="#fff"/><circle cx="120" cy="30" r="0.5" fill="#fff"/>
      <circle cx="200" cy="80" r="0.6" fill="#fff"/><circle cx="350" cy="45" r="0.5" fill="#fff"/>
      <circle cx="480" cy="70" r="0.7" fill="#fff"/><circle cx="90" cy="180" r="0.5" fill="#fff"/>
      <circle cx="300" cy="200" r="0.6" fill="#fff"/><circle cx="420" cy="250" r="0.5" fill="#fff"/>
      <circle cx="150" cy="290" r="0.7" fill="#fff"/><circle cx="500" cy="150" r="0.5" fill="#fff"/>
      <circle cx="60" cy="250" r="0.6" fill="#fff"/><circle cx="380" cy="130" r="0.5" fill="#fff"/>
    </g>

    <!-- Top accent line (gradient fade) -->
    <rect x="0" y="0" width="540" height="2" fill="url(#top-line)"/>

    <!-- Score glow backdrop -->
    <circle cx="456" cy="80" r="80" fill="url(#score-glow)"/>

    <!-- SIBYL brand label -->
    <rect x="28" y="22" width="108" height="18" rx="4" fill="#2ea9a1" fill-opacity="0.08"/>
    <text x="82" y="34" text-anchor="middle" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="8" font-weight="700" letter-spacing="0.18em" fill="#2ea9a1" opacity="0.7">EVALUATION</text>

    <!-- Score circle -->
    <g transform="translate(456, 80)" filter="url(#glow)">
      <!-- Track ring -->
      <circle cx="0" cy="0" r="46" fill="none" stroke="#1a1f2e" stroke-width="6"/>
      <!-- Score arc (78/100 = 78% of circumference) -->
      <circle cx="0" cy="0" r="46" fill="none" stroke="url(#accent)" stroke-width="6"
        stroke-dasharray="289" stroke-dashoffset="64" stroke-linecap="round"
        transform="rotate(-90)"/>
      <!-- Inner subtle ring -->
      <circle cx="0" cy="0" r="36" fill="none" stroke="#2ea9a1" stroke-opacity="0.06" stroke-width="1"/>
      <!-- Score number -->
      <text x="0" y="-2" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="32" font-weight="800" fill="#f0f4fa" letter-spacing="-0.03em">78</text>
      <text x="0" y="16" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" font-weight="500" fill="#4d5a70" letter-spacing="0.1em">SCORE</text>
    </g>

    <!-- Token name -->
    <text x="32" y="76" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="30" font-weight="800" fill="url(#title-grad)" letter-spacing="-0.02em">Exoskeletons</text>

    <!-- Ticker + chain -->
    <rect x="32" y="86" width="46" height="20" rx="4" fill="#c4a862" fill-opacity="0.1"/>
    <text x="55" y="100" text-anchor="middle" font-family="'SF Mono', monospace" font-size="11" font-weight="700" fill="#c4a862">$EXO</text>
    <circle cx="96" cy="96" r="3" fill="#3b82f6"/>
    <text x="106" y="100" font-family="'SF Mono', monospace" font-size="10" font-weight="500" fill="#4d5a70">Base</text>

    <!-- Thin divider with glow -->
    <line x1="32" y1="118" x2="390" y2="118" stroke="#2ea9a1" stroke-opacity="0.08"/>
    <line x1="32" y1="118" x2="180" y2="118" stroke="#2ea9a1" stroke-opacity="0.15"/>

    <!-- Score bars -->
    <g transform="translate(32, 136)">
      <!-- Builder Conviction: 85 -->
      <text y="10" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#c8d0de">Builder Conviction</text>
      <text x="368" y="10" font-family="'SF Mono', monospace" font-size="12" font-weight="700" fill="#34d9cd" text-anchor="end">85</text>
      <rect y="18" width="368" height="5" rx="2.5" fill="#141925"/>
      <rect y="18" width="313" height="5" rx="2.5" fill="url(#accent-bar)" filter="url(#soft-glow)"/>

      <!-- Community Seed: 72 -->
      <text y="44" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#c8d0de">Community Seed</text>
      <text x="368" y="44" font-family="'SF Mono', monospace" font-size="12" font-weight="700" fill="#34d9cd" text-anchor="end">72</text>
      <rect y="52" width="368" height="5" rx="2.5" fill="#141925"/>
      <rect y="52" width="265" height="5" rx="2.5" fill="url(#accent-bar)" filter="url(#soft-glow)"/>

      <!-- On-Chain Proof: 80 -->
      <text y="78" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#c8d0de">On-Chain Proof</text>
      <text x="368" y="78" font-family="'SF Mono', monospace" font-size="12" font-weight="700" fill="#34d9cd" text-anchor="end">80</text>
      <rect y="86" width="368" height="5" rx="2.5" fill="#141925"/>
      <rect y="86" width="294" height="5" rx="2.5" fill="url(#accent-bar)" filter="url(#soft-glow)"/>

      <!-- Product Clarity: 68 (gold, correctable) -->
      <text y="112" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#c8d0de">Product Clarity</text>
      <text x="368" y="112" font-family="'SF Mono', monospace" font-size="12" font-weight="700" fill="#e0c97a" text-anchor="end">68</text>
      <rect y="120" width="368" height="5" rx="2.5" fill="#141925"/>
      <rect y="120" width="250" height="5" rx="2.5" fill="url(#gold-bar)" filter="url(#soft-glow)"/>
    </g>

    <!-- Bottom bar -->
    <rect x="0" y="294" width="540" height="46" fill="#080a10"/>
    <line x1="0" y1="294" x2="540" y2="294" stroke="#2ea9a1" stroke-opacity="0.06"/>

    <!-- Verdict badge -->
    <rect x="32" y="306" width="86" height="24" rx="6" fill="#2ea9a1" fill-opacity="0.15" stroke="#2ea9a1" stroke-opacity="0.2" stroke-width="0.5"/>
    <text x="75" y="322" text-anchor="middle" font-family="'SF Mono', monospace" font-size="9" font-weight="800" letter-spacing="0.08em" fill="#34d9cd">ACQUIRED</text>

    <!-- Stats pills -->
    <rect x="132" y="308" width="96" height="20" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <text x="180" y="322" text-anchor="middle" font-family="'SF Mono', monospace" font-size="8.5" font-weight="500" fill="#6b7a92">15+ contracts</text>

    <rect x="236" y="308" width="114" height="20" rx="4" fill="#ffffff" fill-opacity="0.03"/>
    <text x="293" y="322" text-anchor="middle" font-family="'SF Mono', monospace" font-size="8.5" font-weight="500" fill="#6b7a92">917 rounds tested</text>

    <!-- SIBYL brand bottom right -->
    <g opacity="0.35">
      <text x="508" y="322" text-anchor="end" font-family="'SF Mono', monospace" font-size="8" font-weight="800" letter-spacing="0.16em" fill="#2ea9a1">SIBYL</text>
    </g>

    <!-- Outer border with subtle glow -->
    <rect width="540" height="340" rx="18" fill="none" stroke="#2ea9a1" stroke-opacity="0.06" stroke-width="1"/>
    <rect width="540" height="340" rx="18" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="0.5"/>
  </g>
</svg>
</div>
</body>
</html>
