<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIBYL : Messages</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/jpeg" sizes="32x32" href="/images/sibyl-persona.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:            #08090a;
      --surface:       #0e1118;
      --elevated:      #131620;
      --highest:       #1a1e28;
      --border:        #1a1e28;
      --border-strong: #252a36;
      --text-primary:  #c8ccd4;
      --text-secondary:#8a919c;
      --text-muted:    #555d6b;
      --accent:        #6b8ba5;
      --accent-hover:  #7d9ab2;
      --gold:          #b5a070;
      --gold-hover:    #c4af80;
      --positive:      #5a8a6a;
      --negative:      #b06868;
      --warning:       #b5944a;
      --font-display:  'Fraunces', 'Times New Roman', serif;
      --font-mono:     'IBM Plex Mono', 'Courier New', monospace;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.8125rem;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    ::selection { background: var(--accent); color: var(--bg); }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .topbar-brand {
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.1em;
    }
    .topbar-nav {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }
    .topbar-nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.72rem;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }
    .topbar-nav a:hover, .topbar-nav a.active { color: var(--gold); }
    .topbar-wallet { color: var(--text-muted); font-size: 0.68rem; }
    .logout-btn {
      background: none;
      border: 1px solid var(--border-strong);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      padding: 0.3rem 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .logout-btn:hover { border-color: var(--negative); color: var(--negative); }

    /* Messages area */
    .messages-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
    }
    .messages-thread {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .msg {
      max-width: 75%;
      padding: 0.8rem 1rem;
      font-size: 0.75rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.sibyl {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
    }
    .msg.founder {
      align-self: flex-end;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-right: 3px solid var(--gold);
    }
    .msg-sender {
      font-size: 0.62rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.3rem;
    }
    .msg-time {
      font-size: 0.58rem;
      color: var(--text-muted);
      margin-top: 0.3rem;
    }

    /* Compose */
    .compose {
      display: flex;
      gap: 0.8rem;
      padding: 1rem 2rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .compose textarea {
      flex: 1;
      background: var(--elevated);
      border: 1px solid var(--border-strong);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      padding: 0.6rem 0.8rem;
      resize: none;
      outline: none;
      min-height: 2.8rem;
      max-height: 8rem;
    }
    .compose textarea:focus { border-color: var(--accent); }
    .compose textarea::placeholder { color: var(--text-muted); }
    .send-btn {
      background: var(--gold);
      border: none;
      color: var(--bg);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 500;
      padding: 0.6rem 1.5rem;
      cursor: pointer;
      align-self: flex-end;
      transition: background 0.2s;
    }
    .send-btn:hover { background: var(--gold-hover); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .empty-state {
      color: var(--text-muted);
      text-align: center;
      padding: 3rem;
      font-size: 0.75rem;
    }

    @media (max-width: 600px) {
      .messages-thread { padding: 1rem; }
      .compose { padding: 0.8rem 1rem; }
      .msg { max-width: 90%; }
      .topbar { padding: 0.8rem 1rem; flex-wrap: wrap; gap: 0.5rem; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="topbar-brand">SIBYL</span>
    <div class="topbar-nav">
      <a href="/dashboard">Dashboard</a>
      <a href="/messages" class="active">Messages</a>
      <span class="topbar-wallet" id="walletDisplay"></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="messages-container">
    <div class="messages-thread" id="thread">
      <div class="empty-state">loading messages...</div>
    </div>
    <div class="compose">
      <textarea id="msgInput" placeholder="type a message..." rows="2"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    var API = '/api/partners';
    var token = localStorage.getItem('sibyl_partner_token');
    var isSubdomain = window.location.host.startsWith('partners.');
    if (!token) window.location.href = isSubdomain ? '/' : '/partners';

    var currentAddress = '';

    function headers() {
      return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
    }

    function logout() {
      localStorage.removeItem('sibyl_partner_token');
      var isSubdomain = window.location.host.startsWith('partners.');
      window.location.href = isSubdomain ? '/' : '/partners';
    }

    async function apiFetch(path, opts) {
      var res = await fetch(API + path, Object.assign({ headers: headers() }, opts || {}));
      if (res.status === 401) { logout(); return null; }
      return res.json();
    }

    async function loadMessages() {
      var [authData, msgData] = await Promise.all([
        apiFetch('/auth'),
        apiFetch('/messages?limit=100'),
      ]);
      if (!authData || !msgData) return;

      currentAddress = authData.address;
      var wallet = authData.project.wallet;
      document.getElementById('walletDisplay').textContent = wallet.slice(0, 6) + '...' + wallet.slice(-4);

      var thread = document.getElementById('thread');
      var messages = msgData.messages;

      if (messages.length === 0) {
        thread.innerHTML = '<div class="empty-state">no messages yet. SIBYL will reach out when your first advisory session begins.</div>';
        return;
      }

      var html = '';
      for (var i = 0; i < messages.length; i++) {
        var m = messages[i];
        var isSibyl = m.sender === 'sibyl';
        var cls = isSibyl ? 'sibyl' : 'founder';
        var senderLabel = isSibyl ? 'SIBYL' : 'you';
        var time = new Date(m.created_at).toLocaleString();
        html += '<div class="msg ' + cls + '">';
        html += '<div class="msg-sender">' + senderLabel + '</div>';
        html += esc(m.body);
        html += '<div class="msg-time">' + time + '</div>';
        html += '</div>';
      }

      thread.innerHTML = html;
      thread.scrollTop = thread.scrollHeight;
    }

    async function sendMessage() {
      var input = document.getElementById('msgInput');
      var btn = document.getElementById('sendBtn');
      var body = input.value.trim();
      if (!body) return;

      btn.disabled = true;
      input.value = '';

      await apiFetch('/messages', {
        method: 'POST',
        body: JSON.stringify({ body: body }),
      });

      btn.disabled = false;
      loadMessages();
    }

    // Enter to send, shift+enter for newline
    document.getElementById('msgInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function esc(s) {
      if (!s) return '';
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    loadMessages();

    // Poll for new messages every 30s
    setInterval(loadMessages, 30000);
  </script>
</body>
</html>
