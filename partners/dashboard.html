<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIBYL : Partner Dashboard</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/jpeg" sizes="32x32" href="/images/sibyl-persona.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:            #08090a;
      --surface:       #0e1118;
      --elevated:      #131620;
      --highest:       #1a1e28;
      --border:        #1a1e28;
      --border-strong: #252a36;
      --text-primary:  #c8ccd4;
      --text-secondary:#8a919c;
      --text-muted:    #555d6b;
      --accent:        #6b8ba5;
      --accent-hover:  #7d9ab2;
      --gold:          #b5a070;
      --gold-hover:    #c4af80;
      --positive:      #5a8a6a;
      --negative:      #b06868;
      --warning:       #b5944a;
      --font-display:  'Syne', 'Helvetica Neue', sans-serif;
      --font-mono:     'IBM Plex Mono', 'Courier New', monospace;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.8125rem;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    ::selection { background: var(--accent); color: var(--bg); }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .topbar-brand {
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.1em;
    }
    .project-name {
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .topbar-right {
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .topbar-wallet {
      color: var(--text-muted);
      font-size: 0.65rem;
    }
    .logout-btn {
      background: none;
      border: 1px solid var(--border-strong);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.62rem;
      padding: 0.25rem 0.6rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .logout-btn:hover { border-color: var(--negative); color: var(--negative); }

    /* Main layout: kanban + chat side by side on large screens */
    .main-layout {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Kanban */
    .kanban-container {
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 1.2rem;
      min-height: 0;
    }
    .kanban {
      display: flex;
      gap: 0.8rem;
      height: 100%;
      min-width: min-content;
    }
    .kanban-col {
      width: 260px;
      min-width: 260px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .col-header {
      padding: 0.7rem 0.8rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .col-title {
      font-family: var(--font-display);
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .col-title.pending { color: var(--text-secondary); }
    .col-title.in_progress { color: var(--warning); }
    .col-title.completed { color: var(--positive); }
    .col-title.blocked { color: var(--negative); }
    .col-count {
      font-size: 0.6rem;
      color: var(--text-muted);
      background: var(--elevated);
      padding: 0.1rem 0.4rem;
      border-radius: 2px;
    }
    .col-body {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .col-body::-webkit-scrollbar { width: 3px; }
    .col-body::-webkit-scrollbar-track { background: transparent; }
    .col-body::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

    /* Task card */
    .task-card {
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.7rem;
      cursor: grab;
      transition: border-color 0.15s, transform 0.1s;
    }
    .task-card:hover { border-color: var(--border-strong); }
    .task-card.dragging { opacity: 0.5; transform: rotate(1deg); }
    .task-card-title {
      font-size: 0.75rem;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: 0.3rem;
    }
    .task-card-desc {
      font-size: 0.65rem;
      color: var(--text-muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Modal overlay ─────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      display: none;
    }
    .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; padding-top: 6vh; }
    .modal-card {
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      width: 520px;
      max-width: 94vw;
      max-height: 82vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      position: relative;
    }
    .modal-drag-handle {
      padding: 0.8rem 1rem 0.5rem;
      cursor: grab;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .modal-drag-handle:active { cursor: grabbing; }
    .modal-title {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      flex: 1;
      margin-right: 1rem;
    }
    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      flex-shrink: 0;
    }
    .modal-close:hover { color: var(--text-primary); }
    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }
    .modal-body::-webkit-scrollbar { width: 3px; }
    .modal-body::-webkit-scrollbar-track { background: transparent; }
    .modal-body::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }
    .modal-meta {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .modal-badge {
      font-size: 0.6rem;
      padding: 0.15rem 0.5rem;
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .modal-badge.status-pending { background: var(--highest); color: var(--text-secondary); }
    .modal-badge.status-in_progress { background: #3d3520; color: var(--warning); }
    .modal-badge.status-completed { background: #1a2e22; color: var(--positive); }
    .modal-badge.status-blocked { background: #2e1a1a; color: var(--negative); }
    .modal-section-label {
      font-family: var(--font-display);
      font-size: 0.6rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      margin: 1.2rem 0 0.5rem;
    }
    .modal-section-label:first-child { margin-top: 0; }
    .modal-desc {
      font-size: 0.78rem;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 0.5rem;
    }
    /* Notes */
    .modal-notes {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .modal-note {
      padding: 0.6rem 0.8rem;
      background: var(--elevated);
      border-left: 2px solid var(--accent);
      font-size: 0.72rem;
      color: var(--text-secondary);
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .modal-note-input {
      display: flex;
      gap: 0.4rem;
      margin-top: 0.5rem;
    }
    .modal-note-input textarea {
      flex: 1;
      background: var(--elevated);
      border: 1px solid var(--border-strong);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      padding: 0.5rem 0.6rem;
      resize: vertical;
      outline: none;
      min-height: 2.5rem;
      max-height: 8rem;
      line-height: 1.5;
    }
    .modal-note-input textarea:focus { border-color: var(--accent); }
    .modal-note-input textarea::placeholder { color: var(--text-muted); }
    .modal-note-btn {
      background: var(--accent);
      border: none;
      color: var(--bg);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      padding: 0.5rem 0.8rem;
      cursor: pointer;
      align-self: flex-end;
      flex-shrink: 0;
    }
    .modal-note-btn:hover { background: var(--accent-hover); }
    /* Attachments */
    .modal-files {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .modal-file {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.6rem;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 3px;
      font-size: 0.68rem;
      color: var(--text-secondary);
      text-decoration: none;
      transition: border-color 0.15s;
    }
    .modal-file:hover { border-color: var(--accent); color: var(--accent); }
    .modal-file-icon { color: var(--text-muted); font-size: 0.8rem; }
    .modal-file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .modal-file-size { color: var(--text-muted); font-size: 0.58rem; flex-shrink: 0; }
    .modal-upload-zone {
      margin-top: 0.5rem;
      padding: 0.8rem;
      border: 1px dashed var(--border-strong);
      border-radius: 3px;
      text-align: center;
      font-size: 0.65rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .modal-upload-zone:hover { border-color: var(--accent); color: var(--accent); }
    .modal-upload-zone.drag-active { border-color: var(--gold); color: var(--gold); }
    .modal-upload-zone input { display: none; }
    /* Status actions in modal */
    .modal-actions {
      display: flex;
      gap: 0.4rem;
      margin-top: 0.3rem;
    }
    .modal-action-btn {
      background: none;
      border: 1px solid var(--border-strong);
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-size: 0.62rem;
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      transition: all 0.15s;
      border-radius: 2px;
    }
    .modal-action-btn:hover { border-color: var(--gold); color: var(--gold); }
    .modal-action-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(181,160,112,0.1); }
    .task-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.5rem;
    }
    .task-owner-badge {
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.1rem 0.35rem;
      border-radius: 2px;
    }
    .owner-sibyl { background: #1a2030; color: var(--accent); }
    .owner-founder { background: #2a2518; color: var(--gold); }
    .owner-both { background: #1a2028; color: var(--text-secondary); }
    .task-card-actions {
      display: flex;
      gap: 0.3rem;
    }
    .move-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.55rem;
      padding: 0.1rem 0.3rem;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.15s;
      font-family: var(--font-mono);
    }
    .move-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* Drop zone highlight */
    .col-body.drag-over {
      background: rgba(107, 139, 165, 0.04);
      outline: 1px dashed var(--accent);
      outline-offset: -2px;
    }

    /* Chat panel */
    .chat-panel {
      height: 280px;
      min-height: 200px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .chat-header {
      padding: 0.5rem 1.2rem;
      border-bottom: 1px solid var(--border);
      font-family: var(--font-display);
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .chat-resize {
      cursor: ns-resize;
      color: var(--text-muted);
      font-size: 0.7rem;
      user-select: none;
    }
    .chat-thread {
      flex: 1;
      overflow-y: auto;
      padding: 0.8rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .chat-thread::-webkit-scrollbar { width: 3px; }
    .chat-thread::-webkit-scrollbar-track { background: transparent; }
    .chat-thread::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }
    .chat-msg {
      max-width: 70%;
      padding: 0.5rem 0.7rem;
      font-size: 0.72rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .chat-msg.sibyl {
      align-self: flex-start;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-left: 2px solid var(--accent);
    }
    .chat-msg.founder {
      align-self: flex-end;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-right: 2px solid var(--gold);
    }
    .chat-sender {
      font-size: 0.55rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.2rem;
    }
    .chat-time {
      font-size: 0.52rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }
    .chat-compose {
      display: flex;
      gap: 0.5rem;
      padding: 0.6rem 1.2rem;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .chat-compose textarea {
      flex: 1;
      background: var(--elevated);
      border: 1px solid var(--border-strong);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      padding: 0.4rem 0.6rem;
      resize: none;
      outline: none;
      min-height: 2rem;
      max-height: 5rem;
    }
    .chat-compose textarea:focus { border-color: var(--accent); }
    .chat-compose textarea::placeholder { color: var(--text-muted); }
    .chat-send {
      background: var(--gold);
      border: none;
      color: var(--bg);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 500;
      padding: 0.4rem 1rem;
      cursor: pointer;
      align-self: flex-end;
      transition: background 0.15s;
    }
    .chat-send:hover { background: var(--gold-hover); }
    .chat-send:disabled { opacity: 0.4; cursor: not-allowed; }

    .empty-col {
      color: var(--text-muted);
      font-size: 0.65rem;
      text-align: center;
      padding: 1.5rem 0.5rem;
    }
    .chat-empty {
      color: var(--text-muted);
      font-size: 0.7rem;
      text-align: center;
      padding: 2rem;
    }

    /* Timeline chart */
    .timeline-panel {
      flex-shrink: 0;
      padding: 1.2rem 1.2rem 0;
    }
    .timeline-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .timeline-header {
      padding: 0.7rem 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .timeline-title {
      font-family: var(--font-display);
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
    }
    .timeline-price {
      font-size: 0.7rem;
      color: var(--text-secondary);
    }
    .timeline-price .current { color: var(--text-primary); font-weight: 500; }
    .timeline-price .change.up { color: var(--positive); }
    .timeline-price .change.down { color: var(--negative); }
    .timeline-chart-wrap {
      position: relative;
      height: 160px;
      padding: 0.5rem 0.8rem 0.3rem;
    }
    .timeline-chart-wrap canvas {
      width: 100%;
      height: 100%;
    }
    .timeline-legend {
      display: flex;
      gap: 1.2rem;
      padding: 0.3rem 0.8rem 0.6rem;
      font-size: 0.58rem;
      color: var(--text-muted);
    }
    .legend-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 0.3rem;
      vertical-align: middle;
    }
    .legend-dot.price { background: var(--accent); }
    .legend-dot.start { background: var(--gold); }
    .legend-dot.session { background: var(--positive); }
    .legend-dot.task { background: #8878a8; }
    .timeline-empty {
      color: var(--text-muted);
      font-size: 0.7rem;
      text-align: center;
      padding: 2rem;
    }
    .tooltip {
      position: absolute;
      background: var(--highest);
      border: 1px solid var(--border-strong);
      color: var(--text-primary);
      font-size: 0.62rem;
      padding: 0.3rem 0.5rem;
      border-radius: 3px;
      pointer-events: none;
      white-space: nowrap;
      z-index: 50;
      display: none;
    }

    .loading { color: var(--text-muted); text-align: center; padding: 3rem; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--elevated);
      border: 1px solid var(--border-strong);
      color: var(--text-secondary);
      font-size: 0.7rem;
      padding: 0.4rem 1rem;
      border-radius: 3px;
      opacity: 0;
      transition: all 0.2s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 900px) {
      .kanban-col { width: 220px; min-width: 220px; }
      .chat-msg { max-width: 85%; }
    }
    @media (max-width: 600px) {
      .topbar { padding: 0.6rem 0.8rem; flex-wrap: wrap; gap: 0.5rem; }
      .kanban-container { padding: 0.8rem; }
      .kanban-col { width: 200px; min-width: 200px; }
      .chat-panel { height: 240px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-brand">SIBYL</span>
      <span class="project-name" id="projectName"></span>
    </div>
    <div class="topbar-right">
      <span class="topbar-wallet" id="walletDisplay"></span>
      <button class="logout-btn" onclick="logout()">logout</button>
    </div>
  </div>

  <div class="main-layout" id="main">
    <div class="timeline-panel">
      <div class="timeline-card">
        <div class="timeline-header">
          <span class="timeline-title">Advisory Timeline</span>
          <span class="timeline-price" id="timelinePrice"></span>
        </div>
        <div class="timeline-chart-wrap">
          <canvas id="timelineCanvas"></canvas>
          <div class="tooltip" id="chartTooltip"></div>
        </div>
        <div class="timeline-legend">
          <span><span class="legend-dot price"></span>Token Price</span>
          <span><span class="legend-dot start"></span>Advisory Start</span>
          <span><span class="legend-dot session"></span>Session</span>
          <span><span class="legend-dot task"></span>Task Completed</span>
        </div>
      </div>
    </div>
    <div class="kanban-container">
      <div class="kanban" id="kanban">
        <div class="loading">loading...</div>
      </div>
    </div>
    <div class="chat-panel">
      <div class="chat-header">
        <span>Messages</span>
      </div>
      <div class="chat-thread" id="chatThread">
        <div class="chat-empty">loading...</div>
      </div>
      <div class="chat-compose">
        <textarea id="chatInput" placeholder="message sibyl..." rows="1"></textarea>
        <button class="chat-send" id="chatSend" onclick="sendMessage()">send</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal-card" id="modalCard">
      <div class="modal-drag-handle" id="modalDragHandle">
        <div class="modal-title" id="modalTitle"></div>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    var API = '/api/partners';
    var token = localStorage.getItem('sibyl_partner_token');
    var isSubdomain = window.location.host.startsWith('partners.');
    if (!token) window.location.href = isSubdomain ? '/' : '/partners';

    var COLUMNS = ['pending', 'in_progress', 'completed', 'blocked'];
    var COL_LABELS = { pending: 'Pending', in_progress: 'In Progress', completed: 'Completed', blocked: 'Blocked' };
    var MOVE_OPTIONS = {
      pending: [['in_progress', 'start'], ['blocked', 'block']],
      in_progress: [['completed', 'done'], ['blocked', 'block']],
      completed: [['in_progress', 'reopen']],
      blocked: [['in_progress', 'unblock']],
    };

    var draggedTaskId = null;

    function headers() {
      return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
    }
    function logout() {
      localStorage.removeItem('sibyl_partner_token');
      window.location.href = isSubdomain ? '/' : '/partners';
    }
    async function apiFetch(path, opts) {
      var res = await fetch(API + path, Object.assign({ headers: headers() }, opts || {}));
      if (res.status === 401) { logout(); return null; }
      return res.json();
    }
    function toast(msg) {
      var el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(function() { el.classList.remove('show'); }, 2000);
    }
    function esc(s) {
      if (!s) return '';
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── Kanban ──────────────────────────────────────────────────────

    async function loadBoard() {
      var [projData, taskData] = await Promise.all([
        apiFetch('/project'),
        apiFetch('/tasks'),
      ]);
      if (!projData || !taskData) return;

      var p = projData.project;
      document.getElementById('projectName').textContent = p.name;
      document.getElementById('walletDisplay').textContent = p.wallet.slice(0, 6) + '...' + p.wallet.slice(-4);

      allTasks = taskData.tasks;
      var grouped = {};
      COLUMNS.forEach(function(c) { grouped[c] = []; });
      allTasks.forEach(function(t) { if (grouped[t.status]) grouped[t.status].push(t); });

      var kanban = document.getElementById('kanban');
      var html = '';
      COLUMNS.forEach(function(col) {
        var items = grouped[col];
        html += '<div class="kanban-col">';
        html += '<div class="col-header"><span class="col-title ' + col + '">' + COL_LABELS[col] + '</span><span class="col-count">' + items.length + '</span></div>';
        html += '<div class="col-body" data-status="' + col + '" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">';
        if (items.length === 0) {
          html += '<div class="empty-col">no tasks</div>';
        }
        items.forEach(function(t) {
          html += renderCard(t);
        });
        html += '</div></div>';
      });
      kanban.innerHTML = html;
    }

    var allTasks = [];

    function renderCard(t) {
      var moves = MOVE_OPTIONS[t.status] || [];
      var h = '<div class="task-card" draggable="true" data-id="' + t.id + '" ondragstart="onDragStart(event)" ondragend="onDragEnd(event)" onclick="openModal(' + t.id + ')">';
      h += '<div class="task-card-title">' + esc(t.title) + '</div>';
      if (t.description) h += '<div class="task-card-desc">' + esc(t.description) + '</div>';
      h += '<div class="task-card-footer">';
      h += '<span class="task-owner-badge owner-' + t.owner + '">' + t.owner + '</span>';
      h += '<div class="task-card-actions">';
      moves.forEach(function(m) {
        h += '<button class="move-btn" onclick="event.stopPropagation();moveTask(' + t.id + ',\'' + m[0] + '\')">' + m[1] + '</button>';
      });
      h += '</div></div></div>';
      return h;
    }

    // ── Modal ───────────────────────────────────────────────────────

    var currentModalTask = null;

    async function openModal(taskId) {
      var t = allTasks.find(function(x) { return x.id === taskId; });
      if (!t) return;
      currentModalTask = t;

      document.getElementById('modalTitle').textContent = t.title;

      var moves = MOVE_OPTIONS[t.status] || [];
      var html = '';

      // Meta badges + status actions
      html += '<div class="modal-meta">';
      html += '<span class="modal-badge status-' + t.status + '">' + t.status.replace('_', ' ') + '</span>';
      html += '<span class="modal-badge owner-' + t.owner + '">' + t.owner + '</span>';
      html += '</div>';

      html += '<div class="modal-actions">';
      COLUMNS.forEach(function(s) {
        var cls = s === t.status ? ' active' : '';
        html += '<button class="modal-action-btn' + cls + '" onclick="modalMoveTask(' + t.id + ',\'' + s + '\')">' + COL_LABELS[s].toLowerCase() + '</button>';
      });
      html += '</div>';

      // Description
      if (t.description) {
        html += '<div class="modal-section-label">Description</div>';
        html += '<div class="modal-desc">' + esc(t.description) + '</div>';
      }

      // Notes
      html += '<div class="modal-section-label">Notes</div>';
      html += '<div class="modal-notes" id="modalNotes">';
      if (t.notes) {
        var noteEntries = t.notes.split('\n\n');
        noteEntries.forEach(function(n) {
          if (n.trim()) html += '<div class="modal-note">' + esc(n.trim()) + '</div>';
        });
      } else {
        html += '<div style="color:var(--text-muted);font-size:0.7rem;">no notes yet</div>';
      }
      html += '</div>';
      html += '<div class="modal-note-input">';
      html += '<textarea id="modalNoteInput" placeholder="add a note..." rows="2"></textarea>';
      html += '<button class="modal-note-btn" onclick="modalAddNote(' + t.id + ')">add</button>';
      html += '</div>';

      // Files
      html += '<div class="modal-section-label">Files</div>';
      html += '<div class="modal-files" id="modalFiles"><div style="color:var(--text-muted);font-size:0.65rem;">loading...</div></div>';
      html += '<div class="modal-upload-zone" id="modalUpload" onclick="document.getElementById(\'fileInput\').click()" ondragover="event.preventDefault();this.classList.add(\'drag-active\')" ondragleave="this.classList.remove(\'drag-active\')" ondrop="handleFileDrop(event,' + t.id + ')">';
      html += 'drop a file here or click to upload (max 5MB)';
      html += '<input type="file" id="fileInput" onchange="handleFileSelect(event,' + t.id + ')">';
      html += '</div>';

      document.getElementById('modalBody').innerHTML = html;
      document.getElementById('modalOverlay').classList.add('open');

      // Focus note input
      var ni = document.getElementById('modalNoteInput');
      if (ni) ni.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); modalAddNote(t.id); }
      });

      // Load attachments
      loadAttachments(t.id);
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
      currentModalTask = null;
    }

    // Close on Escape
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && currentModalTask) closeModal();
    });

    async function modalMoveTask(id, status) {
      await apiFetch('/tasks?id=' + id + '&action=status', {
        method: 'PATCH',
        body: JSON.stringify({ status: status }),
      });
      toast(status.replace('_', ' '));
      closeModal();
      loadBoard();
    }

    async function modalAddNote(id) {
      var input = document.getElementById('modalNoteInput');
      var note = input && input.value.trim();
      if (!note) return;
      input.value = '';
      await apiFetch('/tasks?id=' + id + '&action=notes', {
        method: 'PATCH',
        body: JSON.stringify({ note: note }),
      });
      toast('note added');
      // Refresh task data and reopen modal
      await loadBoard();
      openModal(id);
    }

    // Attachments
    async function loadAttachments(taskId) {
      var data = await apiFetch('/attachments?task_id=' + taskId);
      var el = document.getElementById('modalFiles');
      if (!data || !data.attachments || data.attachments.length === 0) {
        el.innerHTML = '<div style="color:var(--text-muted);font-size:0.65rem;">no files attached</div>';
        return;
      }
      var html = '';
      data.attachments.forEach(function(a) {
        var size = a.size_bytes < 1024 ? a.size_bytes + ' B'
          : a.size_bytes < 1048576 ? (a.size_bytes / 1024).toFixed(1) + ' KB'
          : (a.size_bytes / 1048576).toFixed(1) + ' MB';
        var icon = a.mime_type && a.mime_type.startsWith('image/') ? '\u{1f5bc}' : '\u{1f4c4}';
        html += '<a class="modal-file" href="#" onclick="event.preventDefault();downloadFile(' + a.id + ',\'' + esc(a.filename) + '\',\'' + esc(a.mime_type || '') + '\')">';
        html += '<span class="modal-file-icon">' + icon + '</span>';
        html += '<span class="modal-file-name">' + esc(a.filename) + '</span>';
        html += '<span class="modal-file-size">' + size + '</span>';
        html += '</a>';
      });
      el.innerHTML = html;
    }

    function handleFileDrop(e, taskId) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-active');
      var file = e.dataTransfer.files[0];
      if (file) uploadFile(file, taskId);
    }

    function handleFileSelect(e, taskId) {
      var file = e.target.files[0];
      if (file) uploadFile(file, taskId);
      e.target.value = '';
    }

    async function uploadFile(file, taskId) {
      if (file.size > 5 * 1024 * 1024) { toast('file too large (max 5MB)'); return; }
      toast('uploading...');
      var reader = new FileReader();
      reader.onload = async function() {
        var base64 = reader.result.split(',')[1];
        var res = await apiFetch('/attachments', {
          method: 'POST',
          body: JSON.stringify({ task_id: taskId, filename: file.name, mime_type: file.type, data: base64 }),
        });
        if (res && res.attachment) {
          toast('file attached');
          loadAttachments(taskId);
        } else {
          toast('upload failed');
        }
      };
      reader.readAsDataURL(file);
    }

    async function downloadFile(id, filename, mimeType) {
      var res = await fetch(API + '/attachments?id=' + id + '&download=1', { headers: headers() });
      if (!res.ok) { toast('download failed'); return; }
      var blob = await res.blob();
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // Draggable modal
    (function() {
      var handle = document.getElementById('modalDragHandle');
      var card = document.getElementById('modalCard');
      var dragging = false, startX, startY, origX, origY;
      handle.addEventListener('mousedown', function(e) {
        if (e.target.tagName === 'BUTTON') return;
        dragging = true;
        startX = e.clientX; startY = e.clientY;
        var rect = card.getBoundingClientRect();
        origX = rect.left; origY = rect.top;
        card.style.position = 'fixed';
        card.style.margin = '0';
        card.style.left = origX + 'px';
        card.style.top = origY + 'px';
        e.preventDefault();
      });
      document.addEventListener('mousemove', function(e) {
        if (!dragging) return;
        card.style.left = (origX + e.clientX - startX) + 'px';
        card.style.top = (origY + e.clientY - startY) + 'px';
      });
      document.addEventListener('mouseup', function() { dragging = false; });
    })();

    async function moveTask(id, status) {
      await apiFetch('/tasks?id=' + id + '&action=status', {
        method: 'PATCH',
        body: JSON.stringify({ status: status }),
      });
      toast(status.replace('_', ' '));
      loadBoard();
    }

    // Drag and drop
    function onDragStart(e) {
      draggedTaskId = e.target.getAttribute('data-id');
      e.target.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }
    function onDragEnd(e) {
      e.target.classList.remove('dragging');
      draggedTaskId = null;
      document.querySelectorAll('.col-body').forEach(function(el) { el.classList.remove('drag-over'); });
    }
    function onDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      e.currentTarget.classList.add('drag-over');
    }
    function onDragLeave(e) {
      e.currentTarget.classList.remove('drag-over');
    }
    function onDrop(e) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      var newStatus = e.currentTarget.getAttribute('data-status');
      if (draggedTaskId && newStatus) {
        moveTask(parseInt(draggedTaskId), newStatus);
      }
    }

    // ── Chat ────────────────────────────────────────────────────────

    async function loadMessages() {
      var data = await apiFetch('/messages?limit=100');
      if (!data) return;

      var thread = document.getElementById('chatThread');
      var messages = data.messages;

      if (messages.length === 0) {
        thread.innerHTML = '<div class="chat-empty">no messages yet</div>';
        return;
      }

      var html = '';
      messages.forEach(function(m) {
        var isSibyl = m.sender === 'sibyl';
        var cls = isSibyl ? 'sibyl' : 'founder';
        var label = isSibyl ? 'SIBYL' : 'you';
        var time = new Date(m.created_at).toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        html += '<div class="chat-msg ' + cls + '">';
        html += '<div class="chat-sender">' + label + '</div>';
        html += esc(m.body);
        html += '<div class="chat-time">' + time + '</div>';
        html += '</div>';
      });
      thread.innerHTML = html;
      thread.scrollTop = thread.scrollHeight;
    }

    async function sendMessage() {
      var input = document.getElementById('chatInput');
      var btn = document.getElementById('chatSend');
      var body = input.value.trim();
      if (!body) return;
      btn.disabled = true;
      input.value = '';
      await apiFetch('/messages', { method: 'POST', body: JSON.stringify({ body: body }) });
      btn.disabled = false;
      loadMessages();
    }

    document.getElementById('chatInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    // ── Timeline ─────────────────────────────────────────────────────

    var MILESTONE_COLORS = {
      start: '#b5a070',
      session: '#5a8a6a',
      session_closed: '#5a8a6a',
      task_done: '#8878a8',
    };

    async function loadTimeline() {
      var data = await apiFetch('/timeline');
      if (!data) return;
      renderTimeline(data);
    }

    function renderTimeline(data) {
      var priceEl = document.getElementById('timelinePrice');
      if (data.currentPrice && data.currentPrice.usd) {
        var p = data.currentPrice;
        var changeClass = p.change24h >= 0 ? 'up' : 'down';
        var sign = p.change24h >= 0 ? '+' : '';
        priceEl.innerHTML = '<span class="current">$' + p.usd.toFixed(p.usd < 0.01 ? 8 : p.usd < 1 ? 6 : 2) + '</span> <span class="change ' + changeClass + '">' + sign + (p.change24h || 0).toFixed(1) + '%</span>';
      }

      var canvas = document.getElementById('timelineCanvas');
      var ctx = canvas.getContext('2d');
      var dpr = window.devicePixelRatio || 1;
      var rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);
      var W = rect.width;
      var H = rect.height;

      var prices = data.prices || [];
      var milestones = data.milestones || [];

      if (prices.length < 2) {
        ctx.fillStyle = '#555d6b';
        ctx.font = '12px IBM Plex Mono';
        ctx.textAlign = 'center';
        ctx.fillText('price data not yet available', W / 2, H / 2);
        return;
      }

      // Time range
      var pad = { top: 10, right: 10, bottom: 22, left: 50 };
      var chartW = W - pad.left - pad.right;
      var chartH = H - pad.top - pad.bottom;

      var startTime = new Date(prices[0].date).getTime();
      var endTime = new Date(prices[prices.length - 1].date).getTime();
      var timeRange = endTime - startTime || 1;

      // Price range
      var closes = prices.map(function(p) { return p.close; });
      var minPrice = Math.min.apply(null, closes);
      var maxPrice = Math.max.apply(null, closes);
      var priceRange = maxPrice - minPrice || minPrice * 0.1 || 1;
      minPrice -= priceRange * 0.08;
      maxPrice += priceRange * 0.08;
      priceRange = maxPrice - minPrice;

      function xPos(date) { return pad.left + ((new Date(date).getTime() - startTime) / timeRange) * chartW; }
      function yPos(price) { return pad.top + chartH - ((price - minPrice) / priceRange) * chartH; }

      // Grid lines
      ctx.strokeStyle = '#1a1e28';
      ctx.lineWidth = 0.5;
      for (var g = 0; g <= 4; g++) {
        var gy = pad.top + (chartH / 4) * g;
        ctx.beginPath(); ctx.moveTo(pad.left, gy); ctx.lineTo(W - pad.right, gy); ctx.stroke();
        var gPrice = maxPrice - (priceRange / 4) * g;
        ctx.fillStyle = '#555d6b';
        ctx.font = '9px IBM Plex Mono';
        ctx.textAlign = 'right';
        ctx.fillText('$' + formatPrice(gPrice), pad.left - 5, gy + 3);
      }

      // Date labels
      ctx.fillStyle = '#555d6b';
      ctx.font = '9px IBM Plex Mono';
      ctx.textAlign = 'center';
      var labelCount = Math.min(5, prices.length);
      for (var d = 0; d < labelCount; d++) {
        var idx = Math.floor(d * (prices.length - 1) / (labelCount - 1));
        var dt = new Date(prices[idx].date);
        var lbl = (dt.getMonth() + 1) + '/' + dt.getDate();
        ctx.fillText(lbl, xPos(prices[idx].date), H - 4);
      }

      // Price line
      ctx.beginPath();
      ctx.strokeStyle = '#6b8ba5';
      ctx.lineWidth = 1.5;
      ctx.lineJoin = 'round';
      prices.forEach(function(p, i) {
        var x = xPos(p.date);
        var y = yPos(p.close);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      });
      ctx.stroke();

      // Price fill
      ctx.lineTo(xPos(prices[prices.length - 1].date), pad.top + chartH);
      ctx.lineTo(xPos(prices[0].date), pad.top + chartH);
      ctx.closePath();
      var grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + chartH);
      grad.addColorStop(0, 'rgba(107, 139, 165, 0.12)');
      grad.addColorStop(1, 'rgba(107, 139, 165, 0)');
      ctx.fillStyle = grad;
      ctx.fill();

      // Milestone markers
      var markerData = [];
      milestones.forEach(function(m) {
        var mTime = new Date(m.date).getTime();
        if (mTime < startTime || mTime > endTime) return;
        var mx = xPos(m.date);
        var color = MILESTONE_COLORS[m.type] || '#8a919c';

        // Vertical line
        ctx.strokeStyle = color;
        ctx.lineWidth = 0.7;
        ctx.setLineDash([2, 2]);
        ctx.beginPath(); ctx.moveTo(mx, pad.top); ctx.lineTo(mx, pad.top + chartH); ctx.stroke();
        ctx.setLineDash([]);

        // Diamond marker
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(mx, pad.top + chartH + 8);
        ctx.lineTo(mx - 4, pad.top + chartH + 12);
        ctx.lineTo(mx, pad.top + chartH + 16);
        ctx.lineTo(mx + 4, pad.top + chartH + 12);
        ctx.closePath();
        ctx.fill();

        markerData.push({ x: mx, label: m.label, type: m.type, date: m.date });
      });

      // Hover tooltip
      var tooltipEl = document.getElementById('chartTooltip');
      canvas.onmousemove = function(e) {
        var cr = canvas.getBoundingClientRect();
        var mx = e.clientX - cr.left;
        var my = e.clientY - cr.top;

        // Check milestones first
        var hit = null;
        for (var i = 0; i < markerData.length; i++) {
          if (Math.abs(markerData[i].x - mx) < 8) { hit = markerData[i]; break; }
        }

        if (hit) {
          var dt = new Date(hit.date);
          tooltipEl.textContent = hit.label + ' (' + (dt.getMonth() + 1) + '/' + dt.getDate() + ')';
          tooltipEl.style.display = 'block';
          tooltipEl.style.left = Math.min(hit.x, W - 140) + 'px';
          tooltipEl.style.top = '4px';
          return;
        }

        // Check price line
        if (mx >= pad.left && mx <= W - pad.right) {
          var ratio = (mx - pad.left) / chartW;
          var pidx = Math.round(ratio * (prices.length - 1));
          pidx = Math.max(0, Math.min(pidx, prices.length - 1));
          var pp = prices[pidx];
          var dt2 = new Date(pp.date);
          tooltipEl.textContent = '$' + formatPrice(pp.close) + ' (' + (dt2.getMonth() + 1) + '/' + dt2.getDate() + ')';
          tooltipEl.style.display = 'block';
          tooltipEl.style.left = Math.min(mx, W - 100) + 'px';
          tooltipEl.style.top = Math.max(4, yPos(pp.close) - 20) + 'px';
          return;
        }

        tooltipEl.style.display = 'none';
      };
      canvas.onmouseleave = function() { tooltipEl.style.display = 'none'; };
    }

    function formatPrice(p) {
      if (p < 0.00001) return p.toExponential(2);
      if (p < 0.01) return p.toFixed(8);
      if (p < 1) return p.toFixed(6);
      if (p < 100) return p.toFixed(4);
      return p.toFixed(2);
    }

    // ── Init ────────────────────────────────────────────────────────

    Promise.all([loadBoard(), loadMessages(), loadTimeline()]);
    setInterval(loadMessages, 30000);
  </script>
</body>
</html>
