<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIBYL : Partner Dashboard</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/jpeg" sizes="32x32" href="/images/sibyl-persona.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:            #08090a;
      --surface:       #0e1118;
      --elevated:      #131620;
      --highest:       #1a1e28;
      --border:        #1a1e28;
      --border-strong: #252a36;
      --text-primary:  #c8ccd4;
      --text-secondary:#8a919c;
      --text-muted:    #555d6b;
      --accent:        #6b8ba5;
      --accent-hover:  #7d9ab2;
      --gold:          #b5a070;
      --gold-hover:    #c4af80;
      --positive:      #5a8a6a;
      --negative:      #b06868;
      --warning:       #b5944a;
      --font-display:  'Syne', 'Helvetica Neue', sans-serif;
      --font-mono:     'IBM Plex Mono', 'Courier New', monospace;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.8125rem;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    ::selection { background: var(--accent); color: var(--bg); }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .topbar-brand {
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.1em;
    }
    .project-name {
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .topbar-right {
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .topbar-wallet {
      color: var(--text-muted);
      font-size: 0.65rem;
    }
    .logout-btn {
      background: none;
      border: 1px solid var(--border-strong);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.62rem;
      padding: 0.25rem 0.6rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .logout-btn:hover { border-color: var(--negative); color: var(--negative); }

    /* Main layout: kanban + chat side by side on large screens */
    .main-layout {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Kanban */
    .kanban-container {
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 1.2rem;
      min-height: 0;
    }
    .kanban {
      display: flex;
      gap: 0.8rem;
      height: 100%;
      min-width: min-content;
    }
    .kanban-col {
      width: 260px;
      min-width: 260px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .col-header {
      padding: 0.7rem 0.8rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .col-title {
      font-family: var(--font-display);
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .col-title.pending { color: var(--text-secondary); }
    .col-title.in_progress { color: var(--warning); }
    .col-title.completed { color: var(--positive); }
    .col-title.blocked { color: var(--negative); }
    .col-count {
      font-size: 0.6rem;
      color: var(--text-muted);
      background: var(--elevated);
      padding: 0.1rem 0.4rem;
      border-radius: 2px;
    }
    .col-body {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .col-body::-webkit-scrollbar { width: 3px; }
    .col-body::-webkit-scrollbar-track { background: transparent; }
    .col-body::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

    /* Task card */
    .task-card {
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.7rem;
      cursor: grab;
      transition: border-color 0.15s, transform 0.1s;
    }
    .task-card:hover { border-color: var(--border-strong); }
    .task-card.dragging { opacity: 0.5; transform: rotate(1deg); }
    .task-card-title {
      font-size: 0.75rem;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: 0.3rem;
    }
    .task-card-desc {
      font-size: 0.65rem;
      color: var(--text-muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .task-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.5rem;
    }
    .task-owner-badge {
      font-size: 0.55rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.1rem 0.35rem;
      border-radius: 2px;
    }
    .owner-sibyl { background: #1a2030; color: var(--accent); }
    .owner-founder { background: #2a2518; color: var(--gold); }
    .owner-both { background: #1a2028; color: var(--text-secondary); }
    .task-card-actions {
      display: flex;
      gap: 0.3rem;
    }
    .move-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.55rem;
      padding: 0.1rem 0.3rem;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.15s;
      font-family: var(--font-mono);
    }
    .move-btn:hover { border-color: var(--gold); color: var(--gold); }

    /* Drop zone highlight */
    .col-body.drag-over {
      background: rgba(107, 139, 165, 0.04);
      outline: 1px dashed var(--accent);
      outline-offset: -2px;
    }

    /* Chat panel */
    .chat-panel {
      height: 280px;
      min-height: 200px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .chat-header {
      padding: 0.5rem 1.2rem;
      border-bottom: 1px solid var(--border);
      font-family: var(--font-display);
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .chat-resize {
      cursor: ns-resize;
      color: var(--text-muted);
      font-size: 0.7rem;
      user-select: none;
    }
    .chat-thread {
      flex: 1;
      overflow-y: auto;
      padding: 0.8rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .chat-thread::-webkit-scrollbar { width: 3px; }
    .chat-thread::-webkit-scrollbar-track { background: transparent; }
    .chat-thread::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }
    .chat-msg {
      max-width: 70%;
      padding: 0.5rem 0.7rem;
      font-size: 0.72rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .chat-msg.sibyl {
      align-self: flex-start;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-left: 2px solid var(--accent);
    }
    .chat-msg.founder {
      align-self: flex-end;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-right: 2px solid var(--gold);
    }
    .chat-sender {
      font-size: 0.55rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.2rem;
    }
    .chat-time {
      font-size: 0.52rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }
    .chat-compose {
      display: flex;
      gap: 0.5rem;
      padding: 0.6rem 1.2rem;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .chat-compose textarea {
      flex: 1;
      background: var(--elevated);
      border: 1px solid var(--border-strong);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      padding: 0.4rem 0.6rem;
      resize: none;
      outline: none;
      min-height: 2rem;
      max-height: 5rem;
    }
    .chat-compose textarea:focus { border-color: var(--accent); }
    .chat-compose textarea::placeholder { color: var(--text-muted); }
    .chat-send {
      background: var(--gold);
      border: none;
      color: var(--bg);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 500;
      padding: 0.4rem 1rem;
      cursor: pointer;
      align-self: flex-end;
      transition: background 0.15s;
    }
    .chat-send:hover { background: var(--gold-hover); }
    .chat-send:disabled { opacity: 0.4; cursor: not-allowed; }

    .empty-col {
      color: var(--text-muted);
      font-size: 0.65rem;
      text-align: center;
      padding: 1.5rem 0.5rem;
    }
    .chat-empty {
      color: var(--text-muted);
      font-size: 0.7rem;
      text-align: center;
      padding: 2rem;
    }

    .loading { color: var(--text-muted); text-align: center; padding: 3rem; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--elevated);
      border: 1px solid var(--border-strong);
      color: var(--text-secondary);
      font-size: 0.7rem;
      padding: 0.4rem 1rem;
      border-radius: 3px;
      opacity: 0;
      transition: all 0.2s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 900px) {
      .kanban-col { width: 220px; min-width: 220px; }
      .chat-msg { max-width: 85%; }
    }
    @media (max-width: 600px) {
      .topbar { padding: 0.6rem 0.8rem; flex-wrap: wrap; gap: 0.5rem; }
      .kanban-container { padding: 0.8rem; }
      .kanban-col { width: 200px; min-width: 200px; }
      .chat-panel { height: 240px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-brand">SIBYL</span>
      <span class="project-name" id="projectName"></span>
    </div>
    <div class="topbar-right">
      <span class="topbar-wallet" id="walletDisplay"></span>
      <button class="logout-btn" onclick="logout()">logout</button>
    </div>
  </div>

  <div class="main-layout" id="main">
    <div class="kanban-container">
      <div class="kanban" id="kanban">
        <div class="loading">loading...</div>
      </div>
    </div>
    <div class="chat-panel">
      <div class="chat-header">
        <span>Messages</span>
      </div>
      <div class="chat-thread" id="chatThread">
        <div class="chat-empty">loading...</div>
      </div>
      <div class="chat-compose">
        <textarea id="chatInput" placeholder="message sibyl..." rows="1"></textarea>
        <button class="chat-send" id="chatSend" onclick="sendMessage()">send</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    var API = '/api/partners';
    var token = localStorage.getItem('sibyl_partner_token');
    var isSubdomain = window.location.host.startsWith('partners.');
    if (!token) window.location.href = isSubdomain ? '/' : '/partners';

    var COLUMNS = ['pending', 'in_progress', 'completed', 'blocked'];
    var COL_LABELS = { pending: 'Pending', in_progress: 'In Progress', completed: 'Completed', blocked: 'Blocked' };
    var MOVE_OPTIONS = {
      pending: [['in_progress', 'start'], ['blocked', 'block']],
      in_progress: [['completed', 'done'], ['blocked', 'block']],
      completed: [['in_progress', 'reopen']],
      blocked: [['in_progress', 'unblock']],
    };

    var draggedTaskId = null;

    function headers() {
      return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
    }
    function logout() {
      localStorage.removeItem('sibyl_partner_token');
      window.location.href = isSubdomain ? '/' : '/partners';
    }
    async function apiFetch(path, opts) {
      var res = await fetch(API + path, Object.assign({ headers: headers() }, opts || {}));
      if (res.status === 401) { logout(); return null; }
      return res.json();
    }
    function toast(msg) {
      var el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(function() { el.classList.remove('show'); }, 2000);
    }
    function esc(s) {
      if (!s) return '';
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── Kanban ──────────────────────────────────────────────────────

    async function loadBoard() {
      var [projData, taskData] = await Promise.all([
        apiFetch('/project'),
        apiFetch('/tasks'),
      ]);
      if (!projData || !taskData) return;

      var p = projData.project;
      document.getElementById('projectName').textContent = p.name;
      document.getElementById('walletDisplay').textContent = p.wallet.slice(0, 6) + '...' + p.wallet.slice(-4);

      var tasks = taskData.tasks;
      var grouped = {};
      COLUMNS.forEach(function(c) { grouped[c] = []; });
      tasks.forEach(function(t) { if (grouped[t.status]) grouped[t.status].push(t); });

      var kanban = document.getElementById('kanban');
      var html = '';
      COLUMNS.forEach(function(col) {
        var items = grouped[col];
        html += '<div class="kanban-col">';
        html += '<div class="col-header"><span class="col-title ' + col + '">' + COL_LABELS[col] + '</span><span class="col-count">' + items.length + '</span></div>';
        html += '<div class="col-body" data-status="' + col + '" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">';
        if (items.length === 0) {
          html += '<div class="empty-col">no tasks</div>';
        }
        items.forEach(function(t) {
          html += renderCard(t);
        });
        html += '</div></div>';
      });
      kanban.innerHTML = html;
    }

    function renderCard(t) {
      var moves = MOVE_OPTIONS[t.status] || [];
      var h = '<div class="task-card" draggable="true" data-id="' + t.id + '" ondragstart="onDragStart(event)" ondragend="onDragEnd(event)">';
      h += '<div class="task-card-title">' + esc(t.title) + '</div>';
      if (t.description) h += '<div class="task-card-desc">' + esc(t.description) + '</div>';
      h += '<div class="task-card-footer">';
      h += '<span class="task-owner-badge owner-' + t.owner + '">' + t.owner + '</span>';
      h += '<div class="task-card-actions">';
      moves.forEach(function(m) {
        h += '<button class="move-btn" onclick="event.stopPropagation();moveTask(' + t.id + ',\'' + m[0] + '\')">' + m[1] + '</button>';
      });
      h += '</div></div></div>';
      return h;
    }

    async function moveTask(id, status) {
      await apiFetch('/tasks?id=' + id + '&action=status', {
        method: 'PATCH',
        body: JSON.stringify({ status: status }),
      });
      toast(status.replace('_', ' '));
      loadBoard();
    }

    // Drag and drop
    function onDragStart(e) {
      draggedTaskId = e.target.getAttribute('data-id');
      e.target.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    }
    function onDragEnd(e) {
      e.target.classList.remove('dragging');
      draggedTaskId = null;
      document.querySelectorAll('.col-body').forEach(function(el) { el.classList.remove('drag-over'); });
    }
    function onDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      e.currentTarget.classList.add('drag-over');
    }
    function onDragLeave(e) {
      e.currentTarget.classList.remove('drag-over');
    }
    function onDrop(e) {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      var newStatus = e.currentTarget.getAttribute('data-status');
      if (draggedTaskId && newStatus) {
        moveTask(parseInt(draggedTaskId), newStatus);
      }
    }

    // ── Chat ────────────────────────────────────────────────────────

    async function loadMessages() {
      var data = await apiFetch('/messages?limit=100');
      if (!data) return;

      var thread = document.getElementById('chatThread');
      var messages = data.messages;

      if (messages.length === 0) {
        thread.innerHTML = '<div class="chat-empty">no messages yet</div>';
        return;
      }

      var html = '';
      messages.forEach(function(m) {
        var isSibyl = m.sender === 'sibyl';
        var cls = isSibyl ? 'sibyl' : 'founder';
        var label = isSibyl ? 'SIBYL' : 'you';
        var time = new Date(m.created_at).toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        html += '<div class="chat-msg ' + cls + '">';
        html += '<div class="chat-sender">' + label + '</div>';
        html += esc(m.body);
        html += '<div class="chat-time">' + time + '</div>';
        html += '</div>';
      });
      thread.innerHTML = html;
      thread.scrollTop = thread.scrollHeight;
    }

    async function sendMessage() {
      var input = document.getElementById('chatInput');
      var btn = document.getElementById('chatSend');
      var body = input.value.trim();
      if (!body) return;
      btn.disabled = true;
      input.value = '';
      await apiFetch('/messages', { method: 'POST', body: JSON.stringify({ body: body }) });
      btn.disabled = false;
      loadMessages();
    }

    document.getElementById('chatInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    // ── Init ────────────────────────────────────────────────────────

    Promise.all([loadBoard(), loadMessages()]);
    setInterval(loadMessages, 30000);
  </script>
</body>
</html>
