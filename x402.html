    /* ================================================
       WALLET CONNECTION
       ================================================ */
    function loadEthers() {
      if (window.ethers) return Promise.resolve();
      return new Promise(function (resolve, reject) {
        var s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.umd.min.js';
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    async function connectWallet() {
      if (!window.ethereum) {
        alert('Install a wallet (MetaMask, Coinbase Wallet, or Rabby) to pay with USDC.');
        return false;
      }

      await loadEthers();
      await window.ethereum.request({ method: 'eth_requestAccounts' });

      // Switch to Base
      try {
        await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: CHAIN_HEX }] });
      } catch (sw) {
        if (sw.code === 4902) {
          await window.ethereum.request({
            method: 'wallet_addEthereumChain',
            params: [{
              chainId: CHAIN_HEX,
              chainName: 'Base',
              nativeCurrency: { name: 'ETH', symbol: 'ETH', decimals: 18 },
              rpcUrls: ['https://mainnet.base.org'],
              blockExplorerUrls: ['https://basescan.org']
            }]
          });
        } else {
          throw sw;
        }
      }

      var provider = new ethers.BrowserProvider(window.ethereum);
      walletSigner = await provider.getSigner();
      walletAddress = await walletSigner.getAddress();

      walletStatus.textContent = 'connected: ' + walletAddress.slice(0, 6) + '...' + walletAddress.slice(-4);
      walletStatus.className = 'x4-wallet-status connected';
      return true;
    }

    /* ================================================
       USDC PAYMENT (direct transfer + on-chain verification)
       ================================================ */
    async function payWithUsdc() {
      if (!activeService || isLoading) return;

      // Validate required fields first
      var vals = getFormValues();
      for (var i = 0; i < activeService.fields.length; i++) {
        var f = activeService.fields[i];
        if (f.required && !vals[f.name]) {
          status.textContent = f.label + ' is required';
          status.className = 'form-status error';
          return;
        }
      }

      isLoading = true;
      usdcBtn.disabled = true;
      usdcBtn.classList.add('x4-loading');
      status.textContent = '';
      status.className = 'form-status';
      output.classList.remove('visible');

      try {
        // Step 1: Connect wallet if not connected
        if (!walletSigner) {
          status.textContent = 'connecting wallet...';
          status.className = 'form-status';
          var connected = await connectWallet();
          if (!connected) {
            throw new Error('wallet connection failed');
          }
        }

        // Step 2: Send USDC transfer
        status.textContent = 'approve USDC transfer in wallet...';

        var priceUnits = BigInt(Math.round(activeService.priceUsd * 1e6));
        var usdcAbi = ['function transfer(address to, uint256 amount) returns (bool)'];
        var usdcContract = new ethers.Contract(USDC_ADDRESS, usdcAbi, walletSigner);

        var tx = await usdcContract.transfer(BANKR_WALLET, priceUnits);

        // Step 3: Wait for on-chain confirmation
        status.textContent = 'confirming on-chain...';
        await tx.wait();

        // Step 4: Send API request with tx hash for verification
        status.textContent = 'fetching result...';

        var params = [];
        for (var key in vals) {
          params.push(encodeURIComponent(key) + '=' + encodeURIComponent(vals[key]));
        }
        var apiUrl = activeService.path + (params.length ? '?' + params.join('&') : '');

        var paidResp = await fetch(apiUrl, {
          headers: { 'X-PAYMENT-TX': tx.hash }
        });

        var data = await paidResp.json();
        renderOutput(data, activeService.id);

        if (data.error) {
          status.textContent = data.error;
          status.className = 'form-status error';
        } else {
          status.textContent = 'paid. complete.';
          status.className = 'form-status success';
        }

      } catch (err) {
        var msg = err.message || 'payment failed';
        if (msg.includes('user rejected') || msg.includes('User denied')) {
          msg = 'transaction cancelled';
        } else if (msg.includes('insufficient') || msg.includes('exceeds balance')) {
          msg = 'insufficient USDC balance';
        }
        status.textContent = msg;
        status.className = 'form-status error';
      } finally {
        isLoading = false;
        usdcBtn.disabled = false;
        usdcBtn.classList.remove('x4-loading');
      }
    }

        html += '<div class="x4-card-price">' + s.price + ' USDC</div>';
        html += '<div class="x4-card-desc">' + s.desc + '</div>';

    /* ================================================
       SELECT SERVICE
       ================================================ */
    /* ================================================
       MODAL OPEN / CLOSE
       ================================================ */
    function openModal() {
      backdrop.classList.add('open');
      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      backdrop.classList.remove('open');
      modal.classList.remove('open');
      document.body.style.overflow = '';
      output.classList.remove('visible');
      // Deselect card
      var cards = grid.querySelectorAll('.x4-card');
      for (var i = 0; i < cards.length; i++) {
        cards[i].classList.remove('active');
      }
      activeService = null;
    }

    function selectService(idx) {
      var s = SERVICES[idx];
      activeService = s;

      // Update card states
      var cards = grid.querySelectorAll('.x4-card');
      for (var i = 0; i < cards.length; i++) {
        cards[i].classList.toggle('active', i === idx);
      }

      // Panel header
      panelTitle.textContent = s.name;
      panelPrice.textContent = s.path + '  :  ' + s.price + ' USDC';

      // Build form fields
      var fhtml = '';
      for (var j = 0; j < s.fields.length; j++) {
        var f = s.fields[j];
        fhtml += '<div class="form-field">';
        fhtml += '<label for="x4-f-' + f.name + '">' + f.label;
        if (!f.required) fhtml += ' <span class="optional">(optional)</span>';
        fhtml += '</label>';
        fhtml += '<input type="' + (f.type || 'text') + '" id="x4-f-' + f.name + '" name="' + f.name + '"';
        if (f.required) fhtml += ' required';
        if (f.placeholder) fhtml += ' placeholder="' + f.placeholder + '"';
        fhtml += '>';
        fhtml += '</div>';
      }
      form.innerHTML = fhtml;

      // Update demo button
      if (s.noDemo) {
        runBtn.style.display = 'none';
      } else {
        runBtn.style.display = '';
        runBtn.textContent = 'run demo';
        runBtn.disabled = false;
      }

      // USDC button always visible
      usdcBtn.style.display = '';

      // Update curl
      updateCurl();

      // Hide output
      output.classList.remove('visible');

      // Clear status
      status.textContent = '';
      status.className = 'form-status';

      // Add input listeners to update curl live
      var inputs = form.querySelectorAll('input');
      for (var k = 0; k < inputs.length; k++) {
        inputs[k].addEventListener('input', updateCurl);
      }

      // Open modal
      openModal();

      // Focus first input
      setTimeout(function () {
        var first = form.querySelector('input');
        if (first) first.focus();
      }, 200);
    }

    /* ================================================
       CURL GENERATOR
       ================================================ */
    function getFormValues() {
      var vals = {};
      if (!activeService) return vals;
      for (var i = 0; i < activeService.fields.length; i++) {
        var f = activeService.fields[i];
        var el = document.getElementById('x4-f-' + f.name);
        if (el && el.value.trim()) {
          vals[f.name] = el.value.trim();
        }
      }
      return vals;
    }

    function updateCurl() {
      if (!activeService) return;
      var vals = getFormValues();
      var params = [];
      for (var key in vals) {
        params.push(encodeURIComponent(key) + '=' + encodeURIComponent(vals[key]));
      }
      var qs = params.length ? '?' + params.join('&') : '';
      var cmd = 'curl -H "X-PAYMENT: <token>" "https://sibylcap.com' + activeService.path + qs + '"';
      curlCode.textContent = cmd;
    }

    function copyCurl() {
      var text = curlCode.textContent;
      navigator.clipboard.writeText(text).then(function () {
        curlCopy.textContent = 'copied';
        setTimeout(function () { curlCopy.textContent = 'copy'; }, 1500);
      });
    }

    /* ================================================
       SUBMIT DEMO
       ================================================ */
    function handleSubmit() {
      if (!activeService || isLoading || activeService.noDemo) return;

      // Validate required fields
      var vals = getFormValues();
      for (var i = 0; i < activeService.fields.length; i++) {
        var f = activeService.fields[i];
        if (f.required && !vals[f.name]) {
          status.textContent = f.label + ' is required';
          status.className = 'form-status error';
          return;
        }
      }

      isLoading = true;
      runBtn.disabled = true;
      runBtn.textContent = 'running...';
      runBtn.classList.add('x4-loading');
      status.textContent = '';
      status.className = 'form-status';
      output.classList.remove('visible');

      // Build URL
      var params = [];
      for (var key in vals) {
        params.push(encodeURIComponent(key) + '=' + encodeURIComponent(vals[key]));
      }
      params.push('demo=true');
      var url = activeService.path + '?' + params.join('&');

      fetch(url)
        .then(function (res) {
          if (res.status === 429) {
            throw new Error('rate limited: one free demo per service per 24h');
          }
          return res.json().then(function (data) {
            if (data.error) {
              renderOutput(data, activeService.id);
              status.textContent = data.error;
              status.className = 'form-status error';
            } else {
              renderOutput(data, activeService.id);
              status.textContent = 'demo complete';
              status.className = 'form-status success';
            }
          });
        })
        .catch(function (err) {
          var msg = err.message || 'request failed';
          status.textContent = msg;
          status.className = 'form-status error';
        })
        .finally(function () {
          isLoading = false;
          runBtn.disabled = false;
          runBtn.textContent = 'run demo';
          runBtn.classList.remove('x4-loading');
        });
    }

    /* ================================================
       RENDER OUTPUT (SVG-first)

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function buildResultSvg(data, serviceId) {

      function addKV(k,v,c) { y+=22; parts.push(svgT(24,y,k,11,'#888')); parts.push(svgT(W-24,y,String(v),11,c||'#e8e8e8','end')); }

    function svgString(result, responsive) {
      var wAttr = responsive ? '100%' : result.width;

    function syntaxHighlight(json) {
      var str = JSON.stringify(json, null, 2);

        /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
        function (match) {

          else if (/true|false/.test(match)) { cls = 'x4-jv-bool'; }
          else if (/null/.test(match)) { cls = 'x4-jv-null'; }
          return '<span class="' + cls + '">' + match + '</span>';

    }

    function renderOutput(data, serviceId) {

    /* ================================================
       DOWNLOAD + EMAIL
       ================================================ */
    function downloadJson() {
      if (!lastResultData) return;
      var blob = new Blob([JSON.stringify(lastResultData, null, 2)], { type: 'application/json' });
      var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = 'sibyl-' + (lastResultService || 'result') + '-' + Date.now() + '.json';
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(a.href);
    }

    function downloadSvg() {
      if (!lastResultData || !lastResultService) return;
      var result = buildResultSvg(lastResultData, lastResultService);
      var raw = '<?xml version="1.0" encoding="UTF-8"?>\n' + svgString(result, false);
      var blob = new Blob([raw], { type: 'image/svg+xml' });
      var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = 'sibyl-' + (lastResultService || 'result') + '-' + Date.now() + '.svg';
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(a.href);
    }

    function emailResult() {
      if (!lastResultData) return;
      var bar = document.getElementById('x4-output-bar');
      var existing = document.getElementById('x4-email-row');
      if (existing) { existing.remove(); return; }
      var row = document.createElement('div');
      row.id = 'x4-email-row'; row.className = 'x4-r-email';
      row.innerHTML = '<input type="email" id="x4-email-input" placeholder="your@email.com"><button type="button" id="x4-email-send">send</button>';
      bar.parentNode.insertBefore(row, bar.nextSibling);
      document.getElementById('x4-email-input').focus();
      document.getElementById('x4-email-send').addEventListener('click', function() {
        var email = document.getElementById('x4-email-input').value.trim();
        if (!email || !email.includes('@')) return;
        var svc = SERVICES.find(function(s) { return s.id === lastResultService; });
        var subject = 'SIBYL x402: ' + (svc ? svc.name : lastResultService);
        var body = JSON.stringify(lastResultData, null, 2);
        window.open('mailto:' + encodeURIComponent(email) + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body));
        row.innerHTML = '<span class="sent">opening mail client...</span>';
        setTimeout(function() { row.remove(); }, 3000);
      });
    }

    function toggleRaw() {
      jsonPre.style.display = jsonPre.style.display === 'none' ? '' : 'none';
      if (jsonPre.style.display !== 'none') modalBody.scrollTop = modalBody.scrollHeight;
    }

    /* ================================================
       EVENT LISTENERS
       ================================================ */
    grid.addEventListener('click', function (e) {
      var card = e.target.closest('.x4-card');
      if (!card) return;
      var idx = parseInt(card.getAttribute('data-idx'), 10);
      selectService(idx);
    });

    runBtn.addEventListener('click', handleSubmit);
    usdcBtn.addEventListener('click', payWithUsdc);

    form.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        handleSubmit();
      }
    });

    curlCopy.addEventListener('click', copyCurl);
    document.getElementById('x4-dl-svg').addEventListener('click', downloadSvg);
    document.getElementById('x4-dl-json').addEventListener('click', downloadJson);
    document.getElementById('x4-email-btn').addEventListener('click', emailResult);
    document.getElementById('x4-toggle-raw').addEventListener('click', toggleRaw);

    // Modal close handlers
    modalClose.addEventListener('click', closeModal);
    backdrop.addEventListener('click', closeModal);
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && modal.classList.contains('open')) {
        closeModal();
      }
    });

    /* ================================================
       INIT
       ================================================ */
    renderGrid();
  })();
  </script>
</body>
</html>
