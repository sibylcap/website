    /* ================================================
       WALLET CONNECTION
       ================================================ */
    function loadEthers() {
      if (window.ethers) return Promise.resolve();
      return new Promise(function (resolve, reject) {
        var s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.umd.min.js';
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    async function connectWallet() {
      if (!window.ethereum) {
        alert('Install a wallet (MetaMask, Coinbase Wallet, or Rabby) to pay with USDC.');
        return false;
      }

      await loadEthers();
      await window.ethereum.request({ method: 'eth_requestAccounts' });

      // Switch to Base
      try {
        await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: CHAIN_HEX }] });
      } catch (sw) {
        if (sw.code === 4902) {
          await window.ethereum.request({
            method: 'wallet_addEthereumChain',
            params: [{
              chainId: CHAIN_HEX,
              chainName: 'Base',
              nativeCurrency: { name: 'ETH', symbol: 'ETH', decimals: 18 },
              rpcUrls: ['https://mainnet.base.org'],
              blockExplorerUrls: ['https://basescan.org']
            }]
          });
        } else {
          throw sw;
        }
      }

      var provider = new ethers.BrowserProvider(window.ethereum);
      walletSigner = await provider.getSigner();
      walletAddress = await walletSigner.getAddress();

      walletStatus.textContent = 'connected: ' + walletAddress.slice(0, 6) + '...' + walletAddress.slice(-4);
      walletStatus.className = 'x4-wallet-status connected';
      return true;
    }

    /* ================================================
       USDC PAYMENT (x402 EIP-712 signing)
       ================================================ */
    function generateNonce() {
      var bytes = new Uint8Array(32);
      crypto.getRandomValues(bytes);
      return '0x' + Array.from(bytes).map(function (b) { return b.toString(16).padStart(2, '0'); }).join('');
    }

    async function payWithUsdc() {
      if (!activeService || isLoading) return;

      // Validate required fields first
      var vals = getFormValues();
      for (var i = 0; i < activeService.fields.length; i++) {
        var f = activeService.fields[i];
        if (f.required && !vals[f.name]) {
          status.textContent = f.label + ' is required';
          status.className = 'form-status error';
          return;
        }
      }

      isLoading = true;
      usdcBtn.disabled = true;
      usdcBtn.classList.add('x4-loading');
      status.textContent = '';
      status.className = 'form-status';
      output.classList.remove('visible');

      try {
        // Step 1: Connect wallet if not connected
        if (!walletSigner) {
          status.textContent = 'connecting wallet...';
          status.className = 'form-status';
          var connected = await connectWallet();
          if (!connected) {
            throw new Error('wallet connection failed');
          }
        }

        // Step 2: Fetch the endpoint to get 402 payment requirements
        status.textContent = 'fetching payment requirements...';
        var params = [];
        for (var key in vals) {
          params.push(encodeURIComponent(key) + '=' + encodeURIComponent(vals[key]));
        }
        var apiUrl = activeService.path + (params.length ? '?' + params.join('&') : '');

        var reqResp = await fetch(apiUrl);
        if (reqResp.status !== 402) {
          // If not 402, it might have returned data directly (shouldn't happen without payment)
          var directData = await reqResp.json();
          renderOutput(directData, activeService.id);
          status.textContent = 'complete';
          status.className = 'form-status success';
          return;
        }

        var reqBody = await reqResp.json();
        var requirements = reqBody.accepts[0];

        // Step 3: Build and sign EIP-712 TransferWithAuthorization
        status.textContent = 'sign USDC authorization in wallet...';

        var domain = {
          name: (requirements.extra && requirements.extra.name) || 'USD Coin',
          version: (requirements.extra && requirements.extra.version) || '2',
          chainId: CHAIN_ID,
          verifyingContract: USDC_ADDRESS
        };

        var types = {
          TransferWithAuthorization: [
            { name: 'from', type: 'address' },
            { name: 'to', type: 'address' },
            { name: 'value', type: 'uint256' },
            { name: 'validAfter', type: 'uint256' },
            { name: 'validBefore', type: 'uint256' },
            { name: 'nonce', type: 'bytes32' }
          ]
        };

        var now = Math.floor(Date.now() / 1000);
        var nonce = generateNonce();

        var message = {
          from: walletAddress,
          to: requirements.payTo,
          value: requirements.maxAmountRequired,
          validAfter: 0,
          validBefore: now + (requirements.maxTimeoutSeconds || 600),
          nonce: nonce
        };

        var signature = await walletSigner.signTypedData(domain, types, message);

        // Step 4: Build x402 payment payload
        var payload = {
          x402Version: 1,
          scheme: 'exact',
          network: 'eip155:8453',
          payload: {
            signature: signature,
            authorization: {
              from: message.from,
              to: message.to,
              value: message.value,
              validAfter: String(message.validAfter),
              validBefore: String(message.validBefore),
              nonce: nonce
            }
          }
        };

        // Step 5: Retry with payment header
        status.textContent = 'processing payment...';

        var paymentHeader = btoa(JSON.stringify(payload));
        var paidResp = await fetch(apiUrl, {
          headers: { 'X-PAYMENT': paymentHeader }
        });

        if (!paidResp.ok && paidResp.status === 402) {
          throw new Error('payment rejected by facilitator');
        }

        var data = await paidResp.json();
        renderOutput(data, activeService.id);

        if (data.error) {
          status.textContent = data.error;
          status.className = 'form-status error';
        } else {
          status.textContent = 'paid with USDC. complete.';
          status.className = 'form-status success';
        }

      } catch (err) {
        var msg = err.message || 'payment failed';
        if (msg.includes('user rejected') || msg.includes('User denied')) {
          msg = 'transaction cancelled';
        }
        status.textContent = msg;
        status.className = 'form-status error';
      } finally {
        isLoading = false;
        usdcBtn.disabled = false;
        usdcBtn.classList.remove('x4-loading');
      }
    }

      // Update card states

      for (var i = 0; i < cards.length; i++) {

      }

      // Panel header

      panelPrice.textContent = s.path + '  :  ' + s.price + ' USDC';

      // Build form fields

      for (var j = 0; j < s.fields.length; j++) {
        var f = s.fields[j];
        fhtml += '<div class="form-field">';
        fhtml += '<label for="x4-f-' + f.name + '">' + f.label;
        if (!f.required) fhtml += ' <span class="optional">(optional)</span>';
        fhtml += '</label>';
        fhtml += '<input type="' + (f.type || 'text') + '" id="x4-f-' + f.name + '" name="' + f.name + '"';
        if (f.required) fhtml += ' required';
        if (f.placeholder) fhtml += ' placeholder="' + f.placeholder + '"';
        fhtml += '>';
        fhtml += '</div>';
      }
      form.innerHTML = fhtml;

      // Update demo button
      if (s.noDemo) {
        runBtn.style.display = 'none';
      } else {
        runBtn.style.display = '';
        runBtn.textContent = 'run demo';
        runBtn.disabled = false;
      }

      // USDC button always visible
      usdcBtn.style.display = '';

      // Update curl
      updateCurl();

      // Show panel
      panel.classList.add('visible');

      // Hide output
      output.classList.remove('visible');

      // Clear status
      status.textContent = '';
      status.className = 'form-status';

      // Add input listeners to update curl live
      var inputs = form.querySelectorAll('input');
      for (var k = 0; k < inputs.length; k++) {
        inputs[k].addEventListener('input', updateCurl);
      }

      // Scroll panel into view
      panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    /* ================================================
       CURL GENERATOR
       ================================================ */
    function getFormValues() {
      var vals = {};
      if (!activeService) return vals;
      for (var i = 0; i < activeService.fields.length; i++) {
        var f = activeService.fields[i];
        var el = document.getElementById('x4-f-' + f.name);
        if (el && el.value.trim()) {
          vals[f.name] = el.value.trim();
        }
      }
      return vals;
    }

    function updateCurl() {
      if (!activeService) return;
      var vals = getFormValues();
      var params = [];
      for (var key in vals) {
        params.push(encodeURIComponent(key) + '=' + encodeURIComponent(vals[key]));
      }
      var qs = params.length ? '?' + params.join('&') : '';
      var cmd = 'curl -H "X-PAYMENT: <token>" "https://sibylcap.com' + activeService.path + qs + '"';
      curlCode.textContent = cmd;
    }

    function copyCurl() {
      var text = curlCode.textContent;
      navigator.clipboard.writeText(text).then(function () {
        curlCopy.textContent = 'copied';
        setTimeout(function () { curlCopy.textContent = 'copy'; }, 1500);
      });
    }

    /* ================================================
       SUBMIT DEMO
       ================================================ */
    function handleSubmit() {
      if (!activeService || isLoading || activeService.noDemo) return;

      // Validate required fields
      var vals = getFormValues();
      for (var i = 0; i < activeService.fields.length; i++) {
        var f = activeService.fields[i];
        if (f.required && !vals[f.name]) {
          status.textContent = f.label + ' is required';
          status.className = 'form-status error';
          return;
        }
      }

      isLoading = true;
      runBtn.disabled = true;
      runBtn.textContent = 'running...';
      runBtn.classList.add('x4-loading');
      status.textContent = '';
      status.className = 'form-status';
      output.classList.remove('visible');

      // Build URL
      var params = [];
      for (var key in vals) {
        params.push(encodeURIComponent(key) + '=' + encodeURIComponent(vals[key]));
      }
      params.push('demo=true');
      var url = activeService.path + '?' + params.join('&');

      fetch(url)
        .then(function (res) {
          if (res.status === 429) {
            throw new Error('rate limited: one free demo per service per 24h');
          }
          return res.json().then(function (data) {
            if (data.error) {
              renderOutput(data, activeService.id);
              status.textContent = data.error;
              status.className = 'form-status error';
            } else {
              renderOutput(data, activeService.id);
              status.textContent = 'demo complete';
              status.className = 'form-status success';
            }
          });
        })
        .catch(function (err) {
          var msg = err.message || 'request failed';
          status.textContent = msg;
          status.className = 'form-status error';
        })
        .finally(function () {
          isLoading = false;
          runBtn.disabled = false;
          runBtn.textContent = 'run demo';
          runBtn.classList.remove('x4-loading');
        });
    }

    /* ================================================
       RENDER OUTPUT
       ================================================ */
    function extractMetrics(data, serviceId) {
      var items = [];

      if (serviceId === 'check') {
        if (data.safe !== undefined) {
          items.push({ label: 'safe', value: data.safe ? 'YES' : 'NO', color: data.safe ? 'positive' : 'negative' });
        }
        if (data.risk_level) {
          var rc = data.risk_level === 'low' ? 'positive' : data.risk_level === 'critical' ? 'negative' : 'warning';
          items.push({ label: 'risk', value: data.risk_level.toUpperCase(), color: rc });
        }
      }

      if (serviceId === 'score') {
        if (data.score !== undefined) {
          items.push({ label: 'score', value: data.score + '/100', color: data.score >= 60 ? 'positive' : data.score >= 30 ? 'warning' : 'negative' });
        }
        if (data.grade) {
          var gc = data.grade === 'A' ? 'positive' : data.grade === 'F' ? 'negative' : 'warning';
          items.push({ label: 'grade', value: data.grade, color: gc });
        }
      }

      if (serviceId === 'narrative') {
        if (data.meta && data.meta.dominant) {
          items.push({ label: 'dominant', value: data.meta.dominant.label || data.meta.dominant.narrative, color: 'gold' });
        }
        if (data.token_position && data.token_position.alignment) {
          items.push({ label: 'alignment', value: data.token_position.alignment.toUpperCase(), color: 'accent' });
        }
      }

      if (serviceId === 'builder') {
        if (data.builder_score !== undefined) {
          items.push({ label: 'builder score', value: data.builder_score + '/100', color: data.builder_score >= 60 ? 'positive' : data.builder_score >= 30 ? 'warning' : 'negative' });
        }
        if (data.grade) {
          items.push({ label: 'grade', value: data.grade, color: 'gold' });
        }
        if (data.value_rating) {
          items.push({ label: 'value', value: data.value_rating.replace(/_/g, ' '), color: 'accent' });
        }
      }

      if (serviceId === 'evaluate') {
        if (data.conviction_score !== undefined) {
          items.push({ label: 'conviction', value: data.conviction_score + '/30', color: data.conviction_score >= 20 ? 'positive' : data.conviction_score >= 10 ? 'warning' : 'negative' });
        }
        if (data.conviction_tier) {
          items.push({ label: 'tier', value: data.conviction_tier.replace(/_/g, ' '), color: 'gold' });
        }
      }

      if (serviceId === 'advisory') {
        if (data.evaluation && data.evaluation.conviction_score !== undefined) {
          items.push({ label: 'conviction', value: data.evaluation.conviction_score + '/30', color: 'gold' });
        }
        if (data.evaluation && data.evaluation.conviction_tier) {
          items.push({ label: 'tier', value: data.evaluation.conviction_tier.replace(/_/g, ' '), color: 'accent' });
        }
        if (data.advisory && data.advisory.priority) {
          items.push({ label: 'priority', value: data.advisory.priority.toUpperCase(), color: data.advisory.priority === 'high' ? 'negative' : 'warning' });
        }
      }

      if (serviceId === 'fund') {
        if (data.success !== undefined) {
          items.push({ label: 'status', value: data.success ? 'SUCCESS' : 'FAILED', color: data.success ? 'positive' : 'negative' });
        }
        if (data.amount) {
          items.push({ label: 'amount', value: data.amount, color: 'gold' });
        }
      }

      if (serviceId === 'pingcast') {
        if (data.success !== undefined) {
          items.push({ label: 'status', value: data.success ? 'DELIVERED' : 'FAILED', color: data.success ? 'positive' : 'negative' });
        }
        if (data.charged) {
          items.push({ label: 'charged', value: data.charged, color: 'gold' });
        }
      }

      if (serviceId === 'report') {
        if (data.report && data.report.score !== undefined) {
          items.push({ label: 'conviction', value: data.report.score + '/30', color: data.report.score >= 20 ? 'positive' : data.report.score >= 10 ? 'warning' : 'negative' });
        }
        if (data.report && data.report.tier) {
          items.push({ label: 'tier', value: data.report.tier.replace(/_/g, ' '), color: 'gold' });
        }
        if (data.status) {
          items.push({ label: 'status', value: data.status.toUpperCase(), color: 'accent' });
        }
      }

      // Handle error responses
      if (data.error) {
        items = [{ label: 'error', value: data.error, color: 'negative' }];
      }

      return items;
    }

    function syntaxHighlight(json) {
      var str = JSON.stringify(json, null, 2);
      str = str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return str.replace(
        /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
        function (match) {
          var cls = 'x4-jv-number';
          if (/^"/.test(match)) {
            cls = /:$/.test(match) ? 'x4-jv-key' : 'x4-jv-string';
          } else if (/true|false/.test(match)) {
            cls = 'x4-jv-bool';
          } else if (/null/.test(match)) {
            cls = 'x4-jv-null';
          }
          return '<span class="' + cls + '">' + match + '</span>';
        }
      );
    }

    function renderOutput(data, serviceId) {
      var items = extractMetrics(data, serviceId);
      var mhtml = '';
      for (var i = 0; i < items.length; i++) {
        var it = items[i];
        mhtml += '<div class="x4-metric">';
        mhtml += '<div class="x4-metric-label">' + it.label + '</div>';
        mhtml += '<div class="x4-metric-value x4-c-' + it.color + '">' + it.value + '</div>';
        mhtml += '</div>';
      }
      metrics.innerHTML = mhtml;

      reportPreview.innerHTML = '';
      if (serviceId === 'report' && data.svg) {
        reportPreview.innerHTML = data.svg;
      }

      jsonBlock.innerHTML = syntaxHighlight(data);

      output.classList.add('visible');
      output.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    /* ================================================
       EVENT LISTENERS
       ================================================ */
    grid.addEventListener('click', function (e) {
      var card = e.target.closest('.x4-card');
      if (!card) return;
      var idx = parseInt(card.getAttribute('data-idx'), 10);
      selectService(idx);
    });

    runBtn.addEventListener('click', handleSubmit);
    usdcBtn.addEventListener('click', payWithUsdc);

    form.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        handleSubmit();
      }
    });

    curlCopy.addEventListener('click', copyCurl);

    /* ================================================
       INIT
       ================================================ */
    renderGrid();
  })();
  </script>
</body>
</html>
